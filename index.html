        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }

        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 6px; cursor: pointer; background: #cbd5e1; border-radius: 4px; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .keypad-btn {
            background-color: #312e81; color: #e0e7ff; border-radius: 0.5rem; display: flex; flex-direction: column; align-items: center; justify-content: center;
            border-bottom-width: 4px; border-color: #1e1b4b; height: 3.5rem; width: 100%; transition-property: all; transition-duration: 75ms; cursor: pointer; position: relative;
        }
        .keypad-btn:hover { background-color: #3730a3; }
        .keypad-btn:active { border-bottom-width: 0px; transform: translateY(4px); }
        .keypad-btn.active-note { background-color: #10b981; border-color: #047857; color: white; }
        .keypad-btn.active-note:hover { background-color: #34d399; }
        .shortcut-hint { font-size: 0.55rem; position: absolute; bottom: 2px; right: 4px; opacity: 0.6; font-weight: bold; }
        .measure-container { position: relative; }
        .measure-container:hover { background-color: rgba(99, 102, 241, 0.05); border-radius: 0.5rem; }
    </style>

    <!-- Firebase Logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {};
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
        
        let db, auth, user;

        if (Object.keys(firebaseConfig).length > 0) {
            const app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);

            const initAuth = async () => {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            };

            initAuth();

            onAuthStateChanged(auth, (u) => {
                user = u;
                if (user) {
                    const songsRef = collection(db, 'artifacts', appId, 'public', 'data', 'songs');
                    onSnapshot(songsRef, (snapshot) => {
                        const fbSongs = [];
                        snapshot.forEach((doc) => fbSongs.push({ id: doc.id, ...doc.data() }));
                        window.firebaseSongs = fbSongs;
                        if(window.app) window.app.mergeSongs();
                    }, (error) => {
                        console.error("Firestore Error:", error);
                    });
                }
            });
        }

        window.firebaseAPI = {
            saveSong: async (songData) => {
                if (!user || !db) return;
                try {
                    const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'songs', String(songData.id));
                    await setDoc(docRef, songData);
                } catch (e) { console.error("Save Error:", e); }
            },
            deleteSong: async (songId) => {
                if (!user || !db) return;
                try {
                    await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'songs', String(songId)));
                } catch (e) { console.error("Delete Error:", e); }
            }
        };
    </script>

            songNotes: [],
            isPlaying: false,
            activeNoteIndex: -1,
            selectedNoteIndex: null,
            showCounts: true,
            showLyrics: true,
            showLetters: false,
            useMetronome: true,
            tempo: TEMPO_DEFAULT,
            // Point and Click State
            currentInputDuration: 'q',
            inputDotted: false,
            isRestMode: false,
            // Game State
            trainingPitch: 'G4',
            gamePool: ['G4', 'A4', 'B4'],
            gameTargetPitch: 'G4',
            gameShowAnswer: false
        };

        let audioCtxRef = null;
        let animationFrameId = null;

        function getPitchFromY(y, keySig) {
            const offsets = [
                { pitch: 'D5', y: 44 }, { pitch: 'C5', y: 50 }, { pitch: 'B4', y: 56 },
                { pitch: 'A4', y: 62 }, { pitch: 'G4', y: 68 }, { pitch: 'F4', y: 74 },
                { pitch: 'E4', y: 80 }, { pitch: 'D4', y: 86 }, { pitch: 'C4', y: 92 }
            ];
            let closest = offsets.reduce((prev, curr) => Math.abs(curr.y - y) < Math.abs(prev.y - y) ? curr : prev);
            if (keySig === 'G' && closest.pitch === 'F4') return 'F#4';
            return closest.pitch;
        }

        function calculateEastmanCounts(notesArray) {
            let currentBeat = 1.0;
            return notesArray.map(note => {
                const dur = durationMap[note.type];
                let countStr = "";
                if (note.pitch === 'Rest') {
                    countStr = `(${Math.floor(currentBeat)})`;
                } else {
                    const fraction = currentBeat % 1;
                    const beatNum = Math.floor(currentBeat);
                    if (fraction === 0) countStr = `${beatNum}`;
                    else if (fraction === 0.25) countStr = "ti";
                    else if (fraction === 0.5) countStr = "te";
                    else if (fraction === 0.75) countStr = "ta";
                    
                    if (dur >= 1.5) {
                        let arr = [countStr];
                        for(let i = 1; i < Math.floor(dur); i++) arr.push(`${beatNum + i}`);
                        countStr = arr.join("-");
                    }
                }
                currentBeat += dur;
                currentBeat = Math.round(currentBeat * 4) / 4;
                return { ...note, count: countStr };
            });
        }

        function fixAllMeasures(notes, beatsPerMeasure = 4) {
            let maxM = Math.max(...notes.map(n => n.m), 1);
            let fixed = [];

            for (let m = 1; m <= maxM; m++) {
                let mNotes = notes.filter(n => n.m === m);
                let currentBeats = 0;
                let validMNotes = [];

                for (let n of mNotes) {
                    let nBeats = durationMap[n.type];
                    if (currentBeats + nBeats <= beatsPerMeasure) {
                        validMNotes.push({...n, m}); 
                        currentBeats += nBeats;
                    } else {
                        let remainder = beatsPerMeasure - currentBeats;
                        if (remainder > 0) {
                            let newType = 'q';
                            if (remainder >= 4) newType = 'w';
                            else if (remainder >= 3) newType = 'dh';
                            else if (remainder >= 2) newType = 'h';
                            else if (remainder >= 1.5) newType = 'dq';
                            else if (remainder >= 1) newType = 'q';
                            else if (remainder >= 0.5) newType = 'e';
                            else newType = 's';
                            
                            if (n.pitch === 'Rest') newType += 'r';
                            validMNotes.push({...n, type: newType, m});
                            currentBeats += remainder;
                        }
                        break; 
                    }
                    currentBeats = Math.round(currentBeats * 4) / 4;
                }

                while (currentBeats < beatsPerMeasure) {
                    let remainder = beatsPerMeasure - currentBeats;
                    let rType = 'qr';
                    if (remainder >= 4) rType = 'wr';
                    else if (remainder >= 3) rType = 'dhr';
                    else if (remainder >= 2) rType = 'hr';
                    else if (remainder >= 1.5) rType = 'dqr';
                    else if (remainder >= 1) rType = 'qr';
                    else if (remainder >= 0.5) rType = 'er';
                    else rType = 'sr';
                    
                    validMNotes.push({ pitch: 'Rest', type: rType, lyric: '', m });
                    currentBeats += durationMap[rType];
                    currentBeats = Math.round(currentBeats * 4) / 4;
                }
                fixed.push(...validMNotes);
            }

            let finalized = [];
            for (let m = 1; m <= maxM; m++) {
                finalized.push(...calculateEastmanCounts(fixed.filter(n => n.m === m)));
            }
            return finalized;
        }

        function playTone(ctx, freq, time, dur) {
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain); gain.connect(ctx.destination);
            osc.type = 'sine'; osc.frequency.value = freq;
            gain.gain.setValueAtTime(0, time);
            gain.gain.linearRampToValueAtTime(0.6, time + 0.03); 
            gain.gain.setValueAtTime(0.6, time + dur - 0.05);
            gain.gain.linearRampToValueAtTime(0, time + dur);
            osc.start(time); osc.stop(time + dur);
        }

        const appAPI = {
            mergeSongs: () => {
                SONG_LIBRARY = [...DEFAULT_SONGS, ...window.firebaseSongs];
                if (!SONG_LIBRARY.find(s => s.id === state.currentSongId)) {
                    state.currentSongId = 1;
                }
                render();
            },

            setMode: (mode) => {
                appAPI.stopSong(); state.appMode = mode;
                if(mode === 'game') appAPI.generateGameNote();
                render();
            },

            loadSong: (id) => {
                appAPI.stopSong();
                state.selectedNoteIndex = null;
                state.currentSongId = id;
                const newSong = SONG_LIBRARY.find(s => s.id === id);
                state.songNotes = fixAllMeasures(newSong.notes, newSong.beatsPerMeasure);
                render();
            },

            createNewSong: () => {
                const id = Date.now();
                const newSong = {
                    id, title: 'My Custom Song', belt: 'Custom', beatsPerMeasure: 4, keySignature: 'C', isCustom: true,
                    notes: fixAllMeasures([{pitch: 'Rest', type: 'wr', lyric: '', m: 1}], 4)
                };
                if(window.firebaseAPI) window.firebaseAPI.saveSong(newSong);
                state.currentSongId = id;
                state.songNotes = newSong.notes;
                appAPI.mergeSongs(); 
            },

            deleteCurrentSong: () => {
                if(confirm("Are you sure you want to delete this custom song?")) {
                    if(window.firebaseAPI) window.firebaseAPI.deleteSong(state.currentSongId);
                    state.currentSongId = 1;
                    appAPI.loadSong(1);
                }
            },

            updateSongMeta: (field, val) => {
                const song = SONG_LIBRARY.find(s => s.id === state.currentSongId);
                if(!song.isCustom) return; 
                song[field] = val;
                if (field === 'beatsPerMeasure' || field === 'keySignature') {
                    state.songNotes = fixAllMeasures(state.songNotes, song.beatsPerMeasure);
                }
                if(window.firebaseAPI) window.firebaseAPI.saveSong({...song, notes: state.songNotes});
                render();
            },

            saveCurrentEditsToCloud: () => {
                const song = SONG_LIBRARY.find(s => s.id === state.currentSongId);
                if (song && song.isCustom && window.firebaseAPI) {
                    window.firebaseAPI.saveSong({...song, notes: state.songNotes});
                }
            },

            cloneToCustom: () => {
                const oldSong = SONG_LIBRARY.find(s => s.id === state.currentSongId);
                const id = Date.now();
                const newSong = {
                    id, title: oldSong.title + ' (Copy)', belt: 'Custom', beatsPerMeasure: oldSong.beatsPerMeasure, keySignature: oldSong.keySignature, isCustom: true, notes: [...state.songNotes]
                };
                if(window.firebaseAPI) window.firebaseAPI.saveSong(newSong);
                state.currentSongId = id;
                appAPI.mergeSongs();
            },

            setTool: (dur, toggleDot = false, toggleRest = false) => {
                if (toggleDot) state.inputDotted = !state.inputDotted;
                else if (toggleRest) state.isRestMode = !state.isRestMode;
                else state.currentInputDuration = dur;

                // Also immediately apply to selected note if one exists
                if (state.selectedNoteIndex !== null) {
                    if (toggleDot) appAPI.editNote(state.selectedNoteIndex, 'toggleDot', null);
                    else if (toggleRest) appAPI.editNote(state.selectedNoteIndex, 'toggleRest', null);
                    else appAPI.editNote(state.selectedNoteIndex, 'baseDuration', dur);
                } else {
                    render();
                }
            },

            handleStaffClick: (e, globalIndex) => {
                e.stopPropagation();
                if(state.isPlaying) appAPI.stopSong();
                
                const measureEl = e.currentTarget.closest('.measure-container');
                const y = e.clientY - measureEl.getBoundingClientRect().top;
                const currentSong = SONG_LIBRARY.find(s => s.id === state.currentSongId);
                const pitch = getPitchFromY(y, currentSong.keySignature);

                let newNotes = [...state.songNotes];
                let note = { ...newNotes[globalIndex] };

                note.pitch = state.isRestMode ? 'Rest' : pitch;
                let t = state.currentInputDuration;
                if(state.inputDotted && ['q','h','e'].includes(t)) t = 'd' + t;
                if(state.isRestMode) t = t + 'r';
                note.type = t;

                newNotes[globalIndex] = note;
                state.songNotes = fixAllMeasures(newNotes, currentSong.beatsPerMeasure);
                state.selectedNoteIndex = globalIndex;
                
                if(!state.isRestMode) {
                    const ctx = new (window.AudioContext || window.webkitAudioContext)();
                    playTone(ctx, frequencies[pitch], ctx.currentTime, 0.5);
                    setTimeout(() => ctx.close(), 1000);
                }

                appAPI.saveCurrentEditsToCloud();
                render();
            },

            stopSong: () => {
                if (audioCtxRef) { audioCtxRef.close().catch(e => console.error(e)); audioCtxRef = null; }
                if (animationFrameId) cancelAnimationFrame(animationFrameId);
                state.isPlaying = false; state.activeNoteIndex = -1;
                render();
            },

            playSong: () => {
                appAPI.stopSong();
                state.selectedNoteIndex = null;
                render();

                setTimeout(() => {
                    const ctx = new (window.AudioContext || window.webkitAudioContext)();
                    audioCtxRef = ctx; state.isPlaying = true; render(); 
                    const currentSong = SONG_LIBRARY.find(s => s.id === state.currentSongId);
                    const beatDuration = 60 / state.tempo;
                    let time = ctx.currentTime + 0.5; 
                    const schedule = [];
                    const totalMeasures = Math.max(...state.songNotes.map(n => n.m), 1);

                    if (state.useMetronome) {
                        for (let m = 0; m < totalMeasures; m++) {
                            for (let b = 0; b < currentSong.beatsPerMeasure; b++) {
                                const osc = ctx.createOscillator(); const gain = ctx.createGain();
                                osc.connect(gain); gain.connect(ctx.destination); osc.type = 'square';
                                osc.frequency.setValueAtTime(b === 0 ? 1200 : 800, time + (m * currentSong.beatsPerMeasure + b) * beatDuration);
                                gain.gain.setValueAtTime(0, time + (m * currentSong.beatsPerMeasure + b) * beatDuration);
                                gain.gain.linearRampToValueAtTime(0.1, time + (m * currentSong.beatsPerMeasure + b) * beatDuration + 0.005);
                                gain.gain.exponentialRampToValueAtTime(0.001, time + (m * currentSong.beatsPerMeasure + b) * beatDuration + 0.05);
                                osc.start(time + (m * currentSong.beatsPerMeasure + b) * beatDuration); osc.stop(time + (m * currentSong.beatsPerMeasure + b) * beatDuration + 0.05);
                            }
                        }
                    }

                    state.songNotes.forEach((note, i) => {
                        const beats = durationMap[note.type]; const durSecs = beats * beatDuration;
                        if (note.pitch !== 'Rest') playTone(ctx, frequencies[note.pitch], time, durSecs);
                        schedule.push({ index: i, time: time, duration: durSecs });
                        time += durSecs;
                    });

                    const updateUI = () => {
                        if (!audioCtxRef || audioCtxRef.state === 'closed') return;
                        const currTime = audioCtxRef.currentTime;
                        const active = schedule.find(s => currTime >= s.time && currTime < s.time + s.duration);

                        if (active) {
                            if (state.activeNoteIndex !== active.index) {
                                const oldH = document.getElementById(`playback-highlight-${state.activeNoteIndex}`);
                                if(oldH) oldH.classList.replace('opacity-80', 'opacity-0');
                                state.activeNoteIndex = active.index;
                                const newH = document.getElementById(`playback-highlight-${state.activeNoteIndex}`);
                                if(newH) {
                                    newH.classList.replace('opacity-0', 'opacity-80');
                                    newH.classList.add('bg-emerald-300', 'shadow-md', 'ring-4', 'ring-emerald-400', 'z-10');
                                    newH.scrollIntoView({ behavior: "smooth", block: "center", inline: "center" });
                                }
                            }
                            animationFrameId = requestAnimationFrame(updateUI);
                        } else if (currTime >= time) appAPI.stopSong();
                        else animationFrameId = requestAnimationFrame(updateUI);
                    };
                    animationFrameId = requestAnimationFrame(updateUI);
                }, 50);
            },

            editNote: (globalIndex, field, value) => {
                if (globalIndex === null || globalIndex < 0) return;
                let newNotes = [...state.songNotes];
                const note = { ...newNotes[globalIndex] };
                const currentSong = SONG_LIBRARY.find(s => s.id === state.currentSongId);

                if (field === 'pitch') {
                    newNotes[globalIndex] = { ...note, pitch: value };
                    if (value !== 'Rest') {
                        const ctx = new (window.AudioContext || window.webkitAudioContext)();
                        playTone(ctx, frequencies[value], ctx.currentTime, 0.5);
                        setTimeout(() => ctx.close(), 1000);
                    }
                    state.songNotes = newNotes;
                } 
                else if (field === 'lyric') {
                    newNotes[globalIndex] = { ...note, lyric: value };
                    state.songNotes = newNotes;
                }
                else if (field === 'baseDuration') {
                    const isRest = note.pitch === 'Rest';
                    const isDotted = note.type.includes('d');
                    let newType = isDotted ? `d${value}` : value;
                    if(isRest) newType += 'r';
                    note.type = newType;
                    newNotes[globalIndex] = note;
                    state.songNotes = fixAllMeasures(newNotes, currentSong.beatsPerMeasure);
                }
                else if (field === 'toggleDot') {
                    const isRest = note.pitch === 'Rest';
                    const hasDot = note.type.includes('d');
                    let base = note.type.replace('d', '').replace('r', '');
                    if (hasDot) {
                        note.type = base + (isRest ? 'r' : '');
                    } else {
                        if (['q', 'h', 'e'].includes(base)) { 
                            note.type = `d${base}` + (isRest ? 'r' : '');
                        }
                    }
                    newNotes[globalIndex] = note;
                    state.songNotes = fixAllMeasures(newNotes, currentSong.beatsPerMeasure);
                }
                else if (field === 'toggleRest') {
                    note.pitch = note.pitch === 'Rest' ? 'G4' : 'Rest';
                    note.type = note.pitch === 'Rest' ? `${note.type.replace('r','')}r` : note.type.replace('r','');
                    newNotes[globalIndex] = note;
                    state.songNotes = fixAllMeasures(newNotes, currentSong.beatsPerMeasure);
                }
                
                appAPI.saveCurrentEditsToCloud();
                render();
            },

            addMeasure: () => {
                const currentSong = SONG_LIBRARY.find(s => s.id === state.currentSongId);
                const maxM = Math.max(...state.songNotes.map(n => n.m), 0);
                const restType = currentSong.beatsPerMeasure === 4 ? 'wr' : (currentSong.beatsPerMeasure===3?'dhr':'hr'); 
                state.songNotes.push({ pitch: 'Rest', type: restType, lyric: '', m: maxM + 1 });
                state.songNotes = fixAllMeasures(state.songNotes, currentSong.beatsPerMeasure);
                appAPI.saveCurrentEditsToCloud();
                render();
            },

            removeMeasure: () => {
                const currentSong = SONG_LIBRARY.find(s => s.id === state.currentSongId);
                let targetM = state.selectedNoteIndex !== null && state.songNotes[state.selectedNoteIndex] ? state.songNotes[state.selectedNoteIndex].m : Math.max(...state.songNotes.map(n => n.m), 0);
                if (targetM <= 0) return;
                let newNotes = state.songNotes.filter(n => n.m !== targetM);
                newNotes = newNotes.map(n => n.m > targetM ? { ...n, m: n.m - 1 } : n);
                state.selectedNoteIndex = null;
                state.songNotes = fixAllMeasures(newNotes, currentSong.beatsPerMeasure);
                appAPI.saveCurrentEditsToCloud();
                render();
            },
            
            // Training & Game
            setTrainingPitch: (p) => { 
                state.trainingPitch=p; 
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                playTone(ctx, frequencies[p], ctx.currentTime, 0.5);
                setTimeout(() => ctx.close(), 1000);
                render(); 
            },
            generateGameNote: () => { 
                if(state.gamePool.length === 0) return;
                state.gameTargetPitch = state.gamePool[Math.floor(Math.random() * state.gamePool.length)]; 
                state.gameShowAnswer = false; 
                render(); 
            },
            toggleGameAnswer: () => { 
                state.gameShowAnswer = !state.gameShowAnswer; 
                if(state.gameShowAnswer && state.gameTargetPitch !== 'Rest') {
                    const ctx = new (window.AudioContext || window.webkitAudioContext)();
                    playTone(ctx, frequencies[state.gameTargetPitch], ctx.currentTime, 0.5);
                    setTimeout(() => ctx.close(), 1000);
                }
                render(); 
            },
            toggleGamePool: (p) => { 
                if(state.gamePool.includes(p)) state.gamePool = state.gamePool.filter(x=>x!==p); 
                else state.gamePool.push(p); 
                render(); 
            },
            setToggle: (field, val) => { state[field] = val; render(); },
            setTempo: (val) => { state.tempo = Number(val); render(); }
        };
        window.app = appAPI;

        window.addEventListener('keydown', (e) => {
            if (document.activeElement.tagName === 'INPUT') return;
            // Numpad Tool Selector logic
            switch(e.key) {
                case '6': appAPI.setTool('w'); break;
                case '5': appAPI.setTool('h'); break;
                case '4': appAPI.setTool('q'); break;
                case '3': appAPI.setTool('e'); break;
                case '2': appAPI.setTool('s'); break;
                case '.': appAPI.setTool(null, true, false); break;
                case '0': appAPI.setTool(null, false, true); break;
                
                case 'ArrowUp': 
                    if(state.selectedNoteIndex !== null && state.songNotes[state.selectedNoteIndex].pitch !== 'Rest') {
                        e.preventDefault();
                        const p = state.songNotes[state.selectedNoteIndex].pitch;
                        const i = PITCHES.indexOf(p);
                        if(i < PITCHES.length - 1) appAPI.editNote(state.selectedNoteIndex, 'pitch', PITCHES[i+1]);
                    }
                    break;
                case 'ArrowDown': 
                    if(state.selectedNoteIndex !== null && state.songNotes[state.selectedNoteIndex].pitch !== 'Rest') {
                        e.preventDefault();
                        const p = state.songNotes[state.selectedNoteIndex].pitch;
                        const i = PITCHES.indexOf(p);
                        if(i > 0) appAPI.editNote(state.selectedNoteIndex, 'pitch', PITCHES[i-1]);
                    }
                    break;
            }
        });

        // VIEW RENDERERS
        const ICONS = {
            quarter: `<svg width="24" height="24" viewBox="0 0 24 24" class="fill-current stroke-current"><ellipse cx="9" cy="18" rx="4" ry="3" transform="rotate(-20 9 18)" stroke="none" /><line x1="12.5" y1="18" x2="12.5" y2="4" stroke-width="2"/></svg>`,
            half: `<svg width="24" height="24" viewBox="0 0 24 24" class="fill-none stroke-current"><ellipse cx="9" cy="18" rx="4" ry="3" transform="rotate(-20 9 18)" stroke-width="2" /><line x1="12.5" y1="18" x2="12.5" y2="4" stroke-width="2"/></svg>`,
            whole: `<svg width="24" height="24" viewBox="0 0 24 24" class="fill-none stroke-current"><ellipse cx="12" cy="12" rx="6" ry="4" transform="rotate(-20 12 12)" stroke-width="2" /></svg>`,
            eighth: `<svg width="24" height="24" viewBox="0 0 24 24" class="fill-current stroke-current"><ellipse cx="9" cy="18" rx="4" ry="3" transform="rotate(-20 9 18)" stroke="none" /><line x1="12.5" y1="18" x2="12.5" y2="4" stroke-width="2"/><path d="M 12.5 4 C 18 6, 18 12, 14 16 C 16 10, 16 6, 12.5 4" stroke="none" /></svg>`,
            sixteenth: `<svg width="24" height="24" viewBox="0 0 24 24" class="fill-current stroke-current"><ellipse cx="9" cy="18" rx="4" ry="3" transform="rotate(-20 9 18)" stroke="none" /><line x1="12.5" y1="18" x2="12.5" y2="4" stroke-width="2"/><path d="M 12.5 4 C 18 6, 18 12, 14 16 C 16 10, 16 6, 12.5 4" stroke="none" /><path d="M 12.5 10 C 18 12, 18 18, 14 22 C 16 16, 16 12, 12.5 10" stroke="none" /></svg>`,
            dot: `<svg width="24" height="24" viewBox="0 0 24 24" class="fill-current"><circle cx="12" cy="12" r="3" /></svg>`,
            rest: `<svg width="24" height="24" viewBox="0 0 24 24" class="fill-none stroke-current"><path d="M 9 6 L 13 10 L 9 14 L 11 18 C 11 20, 8 20, 7 18" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" /></svg>`
        };

        function getFingeringHTML(pitch, showLabels = true) {
            const fingering = fingerings[pitch];
            if (!fingering || pitch === 'Rest') return '';
            const labels = ['1', '2', '3', '1', '2', '3', 'Pinky'];
            const holes = [1, 2, 3, 4, 5, 6, 7].map((hole, index) => `
                <div class="flex items-center relative w-full justify-center">
                    ${showLabels ? `<span class="absolute right-10 text-[11px] font-extrabold text-slate-500 whitespace-nowrap">${labels[index]}</span>` : ''}
                    <div class="w-[18px] h-[18px] rounded-full border-[3px] border-slate-300 transition-all ${fingering.holes.includes(hole) ? 'bg-slate-800 scale-110' : 'bg-slate-100'} z-10"></div>
                </div>
            `).join('');

            return `
                <div class="flex flex-col items-center w-32 drop-shadow-xl pointer-events-none">
                    <div class="w-14 h-12 bg-red-600 border-4 border-red-800 rounded-t-[2rem] relative shadow-inner">
                        <div class="absolute w-6 h-5 bg-red-950 rounded-md top-3 left-1/2 -translate-x-1/2 shadow-inner"></div>
                    </div>
                    <div class="w-14 h-[270px] bg-slate-50 border-x-4 border-slate-300 flex flex-col items-center py-2 gap-3 relative shadow-[inset_0_0_10px_rgba(0,0,0,0.1)]">
                        <div class="absolute -left-12 top-6 flex flex-col items-center">
                            ${showLabels ? `<span class="text-[11px] font-extrabold mb-1 text-slate-500 whitespace-nowrap">Thumb</span>` : ''}
                            <div class="w-6 h-6 rounded-full border-4 border-slate-300 transition-all ${fingering.thumb ? 'bg-slate-800 scale-110' : 'bg-white'} z-10"></div>
                        </div>
                        ${holes}
                    </div>
                    <div class="w-20 h-14 bg-red-600 border-4 border-red-800 rounded-b-2xl relative shadow-inner" style="clip-path: polygon(15% 0, 85% 0, 100% 100%, 0 100%)">
                        <div class="absolute inset-x-3 bottom-1 h-3 bg-red-900/40 rounded-full blur-sm"></div>
                    </div>
                </div>
            `;
        }

        function getNoteSVGHTML(note, isBeamed, forceStemDown) {
            const isStemDown = isBeamed ? forceStemDown : ['B4', 'C5', 'D5'].includes(note.pitch);
            const pitchY = pitchOffsets[note.pitch];
            const isHollow = ['h', 'dh', 'w'].includes(note.type);
            const isDotted = note.type.includes('d');

            if (note.pitch === 'Rest') {
                let restContent = '';
                if (note.type === 'qr') restContent = `<path d="M -4 -12 L 2 -4 L -4 4 L 0 12 C 0 16, -4 18, -6 14" fill="none" stroke="#334155" stroke-width="2.5" stroke-linecap="round" />`;
                else if (note.type === 'dqr') restContent = `<g><path d="M -4 -12 L 2 -4 L -4 4 L 0 12 C 0 16, -4 18, -6 14" fill="none" stroke="#334155" stroke-width="2.5" stroke-linecap="round" /><circle cx="12" cy="0" r="2.5" fill="#334155" /></g>`;
                else if (note.type === 'hr' || note.type === 'dhr') restContent = `<g><rect x="-6" y="-6" width="12" height="6" fill="#334155" />${note.type === 'dhr' ? '<circle cx="12" cy="-3" r="2.5" fill="#334155" />' : ''}</g>`;
                else if (note.type === 'wr') restContent = `<rect x="-6" y="0" width="12" height="6" fill="#334155" />`;
                else if (note.type === 'er') restContent = `<path d="M -2 -10 A 3 3 0 1 1 -2 -4 L -6 12" fill="none" stroke="#334155" stroke-width="2.5" stroke-linecap="round" />`;
                return `<svg width="24" height="60" class="absolute -translate-x-1/2 left-1/2 overflow-visible pointer-events-none" style="top: ${pitchY}px">${restContent}</svg>`;
            }

            let parts = '';
            if (note.pitch === 'C4') parts += `<line x1="-12" y1="0" x2="12" y2="0" stroke="#1A202C" stroke-width="2" />`;
            // Sharp/Natural Symbol
            const currentSong = SONG_LIBRARY.find(s => s.id === state.currentSongId);
            if (note.pitch.includes('#') && currentSong && currentSong.keySignature !== 'G') parts += `<text x="-20" y="5" font-size="18" font-family="sans-serif" fill="#1A202C" font-weight="bold">♯</text>`;
            if (!note.pitch.includes('#') && note.pitch === 'F4' && currentSong && currentSong.keySignature === 'G') parts += `<text x="-20" y="5" font-size="18" font-family="sans-serif" fill="#1A202C" font-weight="bold">♮</text>`;

            parts += `<ellipse cx="0" cy="0" rx="6.5" ry="4.5" transform="rotate(-20)" fill="${isHollow ? 'white' : '#1A202C'}" stroke="#1A202C" stroke-width="2.5" />`;

            if (!isBeamed && note.type !== 'w') parts += `<rect x="${isStemDown?'-7.5':'5.5'}" y="${isStemDown?'0':'-35'}" width="2" height="35" fill="#1A202C" />`;
            if (!isBeamed && note.type === 'e') parts += `<path d="${isStemDown ? 'M -5.5 35 C 3 30, 7 15, 1 5 C 4 15, 0 25, -3.5 35' : 'M 5.5 -35 C 14 -30, 18 -15, 12 -5 C 15 -15, 11 -25, 7.5 -35'}" fill="#1A202C" />`;
            if (isDotted) parts += `<circle cx="15" cy="-2" r="2.5" fill="#1A202C" />`;

            return `<svg width="2" height="2" class="absolute -translate-x-1/2 left-1/2 overflow-visible pointer-events-none" style="top: ${pitchY}px">${parts}</svg>`;
        }

                    ${currentSong.isCustom ? `

        function renderSheetMusic() {
            const currentSong = SONG_LIBRARY.find(s => s.id === state.currentSongId);
            let noteCounter = 0;
            const totalMeasures = Math.max(...state.songNotes.map(n => n.m), 1);
            let measuresHTML = '';

            for (let i = 0; i < totalMeasures; i++) {
                const measureNotes = state.songNotes.filter(n => n.m === i + 1);
                let currentPct = 0;
                const positionedNotes = measureNotes.map(n => {
                    const globalIndex = noteCounter++;
                    const widthPct = (durationMap[n.type] / currentSong.beatsPerMeasure) * 100;
                    const res = { ...n, globalIndex, widthPct, centerPct: currentPct + (widthPct / 2) };
                    currentPct += widthPct; return res;
                });

                let beamGroups = [], currentGroup = [], beatAccumulator = 0;
                positionedNotes.forEach((note) => {
                    const dur = durationMap[note.type];
                    const isBeammable = ['e', 's'].includes(note.type) && note.pitch !== 'Rest';
                    if (isBeammable) currentGroup.push(note);
                    beatAccumulator += dur;
                    if (!isBeammable || beatAccumulator % 1 === 0 || beatAccumulator >= currentSong.beatsPerMeasure) {
                        if (currentGroup.length > 1) beamGroups.push([...currentGroup]);
                        currentGroup = [];
                    }
                });

                let beamSVGContent = '';
                beamGroups.forEach((group) => {
                    const stemDown = (group.reduce((sum, n) => sum + PITCHES.indexOf(n.pitch), 0) / group.length) >= PITCHES.indexOf('B4');
                    const extremePitchY = stemDown ? Math.max(...group.map(n => pitchOffsets[n.pitch])) : Math.min(...group.map(n => pitchOffsets[n.pitch]));
                    const beamY = stemDown ? extremePitchY + 35 : extremePitchY - 35;
                    const secondaryBeamY = stemDown ? beamY - 8 : beamY + 8;
                    const getX = (pct) => `calc(${pct}% ${stemDown ? '- 6.5px' : '+ 5.5px'})`;

                    let elements = '';
                    group.forEach((n) => elements += `<line x1="${getX(n.centerPct)}" y1="${pitchOffsets[n.pitch]}" x2="${getX(n.centerPct)}" y2="${beamY}" stroke="#1A202C" stroke-width="2" />`);
                    elements += `<line x1="${getX(group[0].centerPct)}" y1="${beamY}" x2="${getX(group[group.length - 1].centerPct)}" y2="${beamY}" stroke="#1A202C" stroke-width="4" />`;
                    
                    for (let idx = 0; idx < group.length; idx++) {
                        if (group[idx].type === 's') {
                            let startX = getX(group[idx].centerPct);
                            if (idx < group.length - 1 && group[idx+1].type === 's') elements += `<line x1="${startX}" y1="${secondaryBeamY}" x2="${getX(group[idx+1].centerPct)}" y2="${secondaryBeamY}" stroke="#1A202C" stroke-width="4" />`;
                            else if (!(idx > 0 && group[idx-1].type === 's')) elements += `<line x1="${startX}" y1="${secondaryBeamY}" x2="calc(${startX} + ${idx === 0 ? '10px' : '-10px'})" y2="${secondaryBeamY}" stroke="#1A202C" stroke-width="4" />`;
                        }
                    }
                    beamSVGContent += `<g>${elements}</g>`;
                });

                const notesHTML = positionedNotes.map(note => {
                    const globalIndex = note.globalIndex;
                    const isSelected = state.selectedNoteIndex === globalIndex;
                    const isBeamed = beamGroups.some(g => g.some(n => n.globalIndex === globalIndex));
                    let groupStemDown = false;
                    if (isBeamed) groupStemDown = (beamGroups.find(g => g.some(n => n.globalIndex === globalIndex)).reduce((sum, n) => sum + PITCHES.indexOf(n.pitch), 0) / beamGroups.find(g => g.some(n => n.globalIndex === globalIndex)).length) >= PITCHES.indexOf('B4');

                    const inputHtml = state.showLyrics ? `<input type="text" value="${note.lyric || ''}" onchange="app.editNote(${globalIndex}, 'lyric', this.value)" onclick="event.stopPropagation()" placeholder="${note.pitch !== 'Rest' ? 'word' : ''}" class="text-[14px] font-extrabold text-slate-800 text-center w-[150%] bg-transparent border-none outline-none focus:bg-white rounded z-40 relative" />` : '';
                    
                    return `
                        <div onclick="app.handleStaffClick(event, ${globalIndex})" style="width: ${note.widthPct}%" class="relative cursor-pointer group flex justify-center hover:bg-indigo-50/50 measure-container">
                            <div class="absolute top-[16px] h-[86px] w-12 left-1/2 -translate-x-1/2 rounded-xl transition-all duration-75 ${isSelected ? 'bg-indigo-200 border-2 border-indigo-400' : 'opacity-0'} pointer-events-none"></div>
                            <div id="playback-highlight-${globalIndex}" class="absolute top-[16px] h-[86px] w-12 left-1/2 -translate-x-1/2 rounded-xl transition-all duration-75 opacity-0 pointer-events-none"></div>
                            <div class="z-10 w-full h-full relative pointer-events-none">${getNoteSVGHTML(note, isBeamed, groupStemDown)}</div>
                            <div class="absolute top-[96px] flex flex-col items-center w-full z-30 gap-0.5 pointer-events-auto">
                                ${inputHtml}
                                ${state.showCounts ? `<span class="text-[14px] font-black text-sky-600 pointer-events-none">${note.count}</span>` : ''}
                            </div>
                        </div>
                    `;
                }).join('');

                const keySigHTML = currentSong.keySignature === 'G' ? `<text x="35" y="38" font-size="28" font-family="sans-serif" font-weight="bold" fill="#1e293b" class="pointer-events-none z-10">♯</text>` : '';

                measuresHTML += `
                    <div class="relative flex w-full h-[150px] select-none">
                        <div class="absolute inset-x-0 top-[32px] border-t-[2px] border-slate-700/50 pointer-events-none"></div>
                        <div class="absolute inset-x-0 top-[44px] border-t-[2px] border-slate-700/50 pointer-events-none"></div>
                        <div class="absolute inset-x-0 top-[56px] border-t-[2px] border-slate-700/50 pointer-events-none"></div>
                        <div class="absolute inset-x-0 top-[68px] border-t-[2px] border-slate-700/50 pointer-events-none"></div>
                        <div class="absolute inset-x-0 top-[80px] border-t-[2px] border-slate-700/50 pointer-events-none"></div>

                        <div class="absolute right-0 top-[32px] h-[48px] border-r-[2px] border-slate-700 z-10 pointer-events-none"></div>
                        ${i % 4 === 0 ? '<div class="absolute left-0 top-[32px] h-[48px] border-l-[2px] border-slate-700 z-10 pointer-events-none"></div>' : ''}
                        ${i === totalMeasures - 1 ? '<div class="absolute right-1.5 top-[32px] h-[48px] border-r-4 border-slate-700 z-10 pointer-events-none"></div>' : ''}

                        ${i === 0 ? `
                            <svg class="absolute inset-0 w-full h-full pointer-events-none z-20 overflow-visible">
                                <text x="10" y="70" font-size="70" fill="#1e293b">&#119070;</text>
                                ${keySigHTML}
                            </svg>
                            <div class="absolute left-[${currentSong.keySignature === 'G' ? '60' : '52'}px] top-[32px] flex flex-col font-serif text-2xl font-bold leading-[24px] text-slate-800 z-10 pointer-events-none">
                                <span>${currentSong.beatsPerMeasure}</span><span>4</span>
                            </div>
                        ` : ''}

                        <svg class="absolute inset-0 w-full h-full pointer-events-none z-20 overflow-visible">${beamSVGContent}</svg>

                        <div class="absolute inset-0 flex items-stretch ${i === 0 ? (currentSong.keySignature === 'G' ? 'pl-[90px]' : 'pl-[76px]') : ''}">
                            ${notesHTML}
                        </div>
                    </div>
                `;
            }

            return `
                <div class="flex-1 overflow-y-auto bg-white p-6 md:p-10 rounded-[2rem] shadow-xl border-[6px] border-slate-200 relative hide-scrollbar min-h-0">
                    <h1 class="text-4xl font-black text-center mb-1 text-slate-800">${currentSong.title}</h1>
                    <h3 class="text-md font-bold text-center mb-8 text-indigo-400 tracking-widest uppercase">${currentSong.belt} Belt${currentSong.isCustom ? ' (Custom)' : ''}</h3>
                    <div class="max-w-[1600px] mx-auto grid grid-cols-1 lg:grid-cols-2 xl:grid-cols-4 gap-y-16 gap-x-0">
                        ${measuresHTML}
                    </div>
                </div>
            `;
        }

        // --- MODE: TRAINING ---
        function renderTrainingMode() {
            return `
                <div class="w-full xl:w-[320px] bg-white p-6 rounded-[2rem] shadow-2xl flex flex-col gap-4 border-[4px] border-indigo-100 shrink-0">
                    <h2 class="text-2xl font-black text-indigo-900 flex items-center gap-2 border-b-2 border-slate-100 pb-2"><i data-lucide="book-open"></i> Note Trainer</h2>
                    <p class="text-sm font-bold text-slate-500 mb-2">Select a pitch below to view its fingering chart.</p>
                    <div class="grid grid-cols-2 gap-3">
                        ${PITCHES.map(p => `
                            <button onclick="app.setTrainingPitch('${p}')" class="py-4 font-black text-xl rounded-xl border-4 transition-transform active:scale-95 ${state.trainingPitch === p ? 'bg-emerald-100 border-emerald-500 text-emerald-800 shadow-md' : 'bg-slate-50 border-slate-200 text-slate-600 hover:bg-slate-100'}">
                                ${p.replace('4','').replace('5','')}
                            </button>
                        `).join('')}
                    </div>
                </div>
                
                <div class="flex-1 bg-white rounded-[2rem] shadow-xl border-[6px] border-slate-200 flex flex-col items-center justify-center p-8 relative overflow-hidden">
                    <div class="absolute top-8 left-12 text-6xl font-black text-slate-200 pointer-events-none">${state.trainingPitch.replace('4','').replace('5','')}</div>
                    
                    <div class="flex flex-col xl:flex-row items-center justify-center gap-16 xl:gap-32 w-full">
                        <!-- Giant Staff -->
                        <div class="relative w-[300px] h-[160px] transform scale-[1.5]">
                            <div class="absolute inset-x-0 top-[32px] border-t-[2px] border-slate-700/50 pointer-events-none"></div>
                            <div class="absolute inset-x-0 top-[44px] border-t-[2px] border-slate-700/50 pointer-events-none"></div>
                            <div class="absolute inset-x-0 top-[56px] border-t-[2px] border-slate-700/50 pointer-events-none"></div>
                            <div class="absolute inset-x-0 top-[68px] border-t-[2px] border-slate-700/50 pointer-events-none"></div>
                            <div class="absolute inset-x-0 top-[80px] border-t-[2px] border-slate-700/50 pointer-events-none"></div>
                            <span class="absolute -top-[16px] left-2 text-[70px] leading-none text-slate-800 pointer-events-none">&#119070;</span>
                            
                            <div class="absolute left-1/2">
                                ${getNoteSVGHTML({pitch: state.trainingPitch, type: 'w'}, false, false)}
                            </div>
                        </div>

                        <!-- Giant Fingering -->
                        <div class="transform scale-[1.5]">
                            ${getFingeringHTML(state.trainingPitch, true)}
                        </div>
                    </div>
                </div>
            `;
        }

        // --- MODE: GAME ---
        function renderGameMode() {
            return `
                <div class="w-full xl:w-[320px] bg-white p-6 rounded-[2rem] shadow-2xl flex flex-col gap-4 border-[4px] border-indigo-100 shrink-0">
                    <h2 class="text-2xl font-black text-indigo-900 flex items-center gap-2 border-b-2 border-slate-100 pb-2"><i data-lucide="gamepad-2"></i> Game Setup</h2>
                    <p class="text-sm font-bold text-slate-500">Select which notes you want to test the students on:</p>
                    
                    <div class="grid grid-cols-2 gap-2 mb-2">
                        ${PITCHES.map(p => `
                            <label class="flex items-center gap-2 p-3 bg-slate-50 rounded-xl border-2 border-slate-200 cursor-pointer hover:bg-indigo-50 transition-colors">
                                <input type="checkbox" ${state.gamePool.includes(p)?'checked':''} onchange="app.toggleGamePool('${p}')" class="w-5 h-5 accent-indigo-600">
                                <span class="font-black text-lg text-slate-700">${p.replace('4','').replace('5','')}</span>
                            </label>
                        `).join('')}
                    </div>

                    <button onclick="app.generateGameNote()" class="py-4 mt-auto bg-indigo-600 hover:bg-indigo-700 text-white font-black text-xl rounded-xl shadow-lg transform transition active:scale-95 flex justify-center items-center gap-2">
                        Next Note <i data-lucide="shuffle" class="w-6 h-6"></i>
                    </button>
                </div>
                
                <div class="flex-1 bg-white rounded-[2rem] shadow-xl border-[6px] border-slate-200 flex flex-col items-center justify-center p-8 relative overflow-hidden">
                    <div class="text-5xl md:text-6xl font-black text-slate-800 mb-16 text-center">What is this note?</div>
                    
                    <div class="flex flex-col xl:flex-row items-center justify-center gap-16 xl:gap-32 w-full">
                        <!-- Giant Staff -->
                        <div class="relative w-[300px] h-[160px] transform scale-[1.5]">
                            <div class="absolute inset-x-0 top-[32px] border-t-[2px] border-slate-700/50 pointer-events-none"></div>
                            <div class="absolute inset-x-0 top-[44px] border-t-[2px] border-slate-700/50 pointer-events-none"></div>
                            <div class="absolute inset-x-0 top-[56px] border-t-[2px] border-slate-700/50 pointer-events-none"></div>
                            <div class="absolute inset-x-0 top-[68px] border-t-[2px] border-slate-700/50 pointer-events-none"></div>
                            <div class="absolute inset-x-0 top-[80px] border-t-[2px] border-slate-700/50 pointer-events-none"></div>
                            <span class="absolute -top-[16px] left-2 text-[70px] leading-none text-slate-800 pointer-events-none">&#119070;</span>
                            
                            <div class="absolute left-1/2">
                                ${state.gameTargetPitch ? getNoteSVGHTML({pitch: state.gameTargetPitch, type: 'w'}, false, false) : ''}
                            </div>
                        </div>

                        <!-- Answer Reveal Area -->
                        <div class="w-[300px] flex flex-col items-center justify-center min-h-[400px]">
                            ${state.gameShowAnswer ? `
                                <div class="text-7xl font-black text-emerald-600 mb-6 drop-shadow-sm">${state.gameTargetPitch.replace('4','').replace('5','')}</div>
                                <div class="transform scale-[1.2]">
                                    ${getFingeringHTML(state.gameTargetPitch, true)}
                                </div>
                            ` : `
                                <button onclick="app.toggleGameAnswer()" class="px-8 py-6 bg-amber-400 hover:bg-amber-300 text-amber-900 font-black text-3xl rounded-2xl shadow-xl border-b-8 border-amber-500 transform transition active:translate-y-2 active:border-b-0 w-full text-center">
                                    Reveal Answer 👀
                                </button>
                            `}
                        </div>
                    </div>
                </div>
            `;
        }

        function render() {
            const root = document.getElementById('root');
            let content = '';
            if (state.appMode === 'song') content = renderSidebar() + renderSheetMusic();
            else if (state.appMode === 'training') content = renderTrainingMode();
            else if (state.appMode === 'game') content = renderGameMode();
            
            root.innerHTML = renderNav() + `<div class="h-full w-full p-4 flex flex-col xl:flex-row gap-4 overflow-hidden min-h-0">${content}</div>`;
            if(window.lucide) window.lucide.createIcons();
        }

        window.onload = () => appAPI.loadSong(1);
    </script>
</body>
</html>
