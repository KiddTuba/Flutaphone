<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flutophone Smartboard App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 20px;
            width: 20px;
            border-radius: 50%;
            background: #6366f1;
            cursor: pointer;
            margin-top: -8px;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 6px;
            cursor: pointer;
            background: #cbd5e1;
            border-radius: 4px;
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        
        /* Sibelius Keypad Button Styles */
        .keypad-btn {
            background-color: #312e81; 
            color: #e0e7ff; 
            border-radius: 0.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-bottom-width: 4px;
            border-color: #1e1b4b; 
            height: 3.5rem;
            width: 100%;
            transition-property: all;
            transition-duration: 75ms;
            cursor: pointer;
            position: relative;
        }
        .keypad-btn:hover {
            background-color: #3730a3; 
        }
        .keypad-btn:active {
            border-bottom-width: 0px;
            transform: translateY(4px);
        }
        .keypad-btn.active-note {
            background-color: #10b981; 
            border-color: #047857; 
            color: white;
        }
        .keypad-btn.active-note:hover {
            background-color: #34d399; 
        }
        .keypad-action {
            background-color: #475569; 
            border-color: #1e293b; 
        }
        .keypad-action:hover {
            background-color: #64748b; 
        }
        .shortcut-hint {
            font-size: 0.55rem;
            position: absolute;
            bottom: 2px;
            right: 4px;
            opacity: 0.6;
            font-weight: bold;
        }
    </style>
</head>
<body class="bg-slate-100 text-slate-800 font-sans h-screen w-screen overflow-hidden flex flex-col">

    <div id="root" class="h-full w-full flex flex-col overflow-hidden min-h-0">
        <!-- Rendered via JS -->
    </div>

    <script>
        // --- Constants & Flutophone Data ---
        const TEMPO_DEFAULT = 90;
        const PITCHES = ['C4', 'D4', 'E4', 'F4', 'F#4', 'G4', 'A4', 'B4', 'C5', 'D5'];

        const pitchOffsets = {
            'D5': 44, 'C5': 50, 'B4': 56, 'A4': 62, 'G4': 68,
            'F#4': 74, 'F4': 74, 'E4': 80, 'D4': 86, 'C4': 92,
            'Rest': 56, 
        };

        const frequencies = {
            'C4': 261.63 * 2, 'D4': 293.66 * 2, 'E4': 329.63 * 2,
            'F4': 349.23 * 2, 'F#4': 369.99 * 2, 'G4': 392.00 * 2,
            'A4': 440.00 * 2, 'B4': 493.88 * 2, 'C5': 523.25 * 2, 'D5': 587.33 * 2
        };

        const durationMap = { 
            'w': 4, 'wr': 4, 'dh': 3, 'dhr': 3, 'h': 2, 'hr': 2,
            'dq': 1.5, 'dqr': 1.5, 'q': 1, 'qr': 1, 'e': 0.5, 'er': 0.5,
            's': 0.25, 'sr': 0.25
        };

        const fingerings = {
            'C4': { thumb: true, holes: [1, 2, 3, 4, 5, 6, 7] },
            'D4': { thumb: true, holes: [1, 2, 3, 4, 5, 6] },
            'E4': { thumb: true, holes: [1, 2, 3, 4, 5] },
            'F4': { thumb: true, holes: [1, 2, 3, 4] },
            'F#4': { thumb: true, holes: [1, 2, 3, 5, 6] },
            'G4': { thumb: true, holes: [1, 2, 3] },
            'A4': { thumb: true, holes: [1, 2] },
            'B4': { thumb: true, holes: [1] },
            'C5': { thumb: true, holes: [2] },
            'D5': { thumb: false, holes: [2] },
            'Rest': { thumb: false, holes: [] }
        };

        const SONG_LIBRARY = [
            {
                id: 1, title: 'Hot Cross Buns', belt: 'White', beatsPerMeasure: 4,
                notes: [
                { pitch: 'B4', type: 'q', lyric: 'Hot', m: 1 }, { pitch: 'A4', type: 'q', lyric: 'cross', m: 1 }, { pitch: 'G4', type: 'h', lyric: 'buns,', m: 1 },
                { pitch: 'B4', type: 'q', lyric: 'Hot', m: 2 }, { pitch: 'A4', type: 'q', lyric: 'cross', m: 2 }, { pitch: 'G4', type: 'h', lyric: 'buns,', m: 2 },
                { pitch: 'G4', type: 'e', lyric: 'One', m: 3 }, { pitch: 'G4', type: 'e', lyric: 'a', m: 3 }, { pitch: 'G4', type: 'e', lyric: 'pen-', m: 3 }, { pitch: 'G4', type: 'e', lyric: 'ny,', m: 3 }, { pitch: 'A4', type: 'e', lyric: 'Two', m: 3 }, { pitch: 'A4', type: 'e', lyric: 'a', m: 3 }, { pitch: 'A4', type: 'e', lyric: 'pen-', m: 3 }, { pitch: 'A4', type: 'e', lyric: 'ny,', m: 3 },
                { pitch: 'B4', type: 'q', lyric: 'Hot', m: 4 }, { pitch: 'A4', type: 'q', lyric: 'cross', m: 4 }, { pitch: 'G4', type: 'h', lyric: 'buns!', m: 4 }
                ]
            },
            {
                id: 5, title: 'Old MacDonald', belt: 'Purple', beatsPerMeasure: 4,
                notes: [
                { pitch: 'G4', type: 'q', lyric: 'Old', m: 1 }, { pitch: 'G4', type: 'q', lyric: 'Mac-', m: 1 }, { pitch: 'G4', type: 'q', lyric: 'Don-', m: 1 }, { pitch: 'D4', type: 'q', lyric: 'ald', m: 1 },
                { pitch: 'E4', type: 'q', lyric: 'had', m: 2 }, { pitch: 'E4', type: 'q', lyric: 'a', m: 2 }, { pitch: 'D4', type: 'q', lyric: 'farm,', m: 2 }, { pitch: 'Rest', type: 'qr', lyric: '', m: 2 },
                { pitch: 'B4', type: 'q', lyric: 'E', m: 3 }, { pitch: 'B4', type: 'q', lyric: 'I', m: 3 }, { pitch: 'A4', type: 'q', lyric: 'E', m: 3 }, { pitch: 'A4', type: 'q', lyric: 'I', m: 3 },
                { pitch: 'G4', type: 'dh', lyric: 'O.', m: 4 }, { pitch: 'Rest', type: 'qr', lyric: '', m: 4 },
                { pitch: 'D4', type: 'e', lyric: 'With', m: 5 }, { pitch: 'D4', type: 'e', lyric: 'a', m: 5 }, { pitch: 'G4', type: 'q', lyric: 'chick', m: 5 }, { pitch: 'G4', type: 'q', lyric: 'chick', m: 5 }, { pitch: 'G4', type: 'q', lyric: 'here,', m: 5 },
                { pitch: 'D4', type: 'e', lyric: 'And', m: 6 }, { pitch: 'D4', type: 'e', lyric: 'a', m: 6 }, { pitch: 'G4', type: 'q', lyric: 'chick', m: 6 }, { pitch: 'G4', type: 'q', lyric: 'chick', m: 6 }, { pitch: 'G4', type: 'q', lyric: 'there,', m: 6 },
                { pitch: 'B4', type: 'q', lyric: 'E', m: 7 }, { pitch: 'B4', type: 'q', lyric: 'I', m: 7 }, { pitch: 'A4', type: 'q', lyric: 'E', m: 7 }, { pitch: 'A4', type: 'q', lyric: 'I', m: 7 },
                { pitch: 'G4', type: 'dh', lyric: 'O.', m: 8 }, { pitch: 'Rest', type: 'qr', lyric: '', m: 8 }
                ]
            }
        ];

        // --- Application State ---
        const state = {
            appMode: 'song', // 'song', 'training', 'game'
            currentSongId: 5,
            songNotes: [],
            isPlaying: false,
            activeNoteIndex: -1,
            selectedNoteIndex: null,
            draggedIndex: null,
            dragOverIndex: null,
            showCounts: true,
            showLyrics: true,
            showLetters: false,
            useMetronome: true,
            tempo: TEMPO_DEFAULT,
            referenceFileUrl: null,
            referenceFileType: null,
            refZoom: 1,
            // Game & Training State
            trainingPitch: 'G4',
            gamePool: ['G4', 'A4', 'B4'],
            gameTargetPitch: 'G4',
            gameShowAnswer: false
        };

        let audioCtxRef = null;
        let animationFrameId = null;

        // --- Logic Engine ---
        function calculateEastmanCounts(notesArray) {
            let currentBeat = 1.0;
            return notesArray.map(note => {
                const dur = durationMap[note.type];
                let countStr = "";

                if (note.pitch === 'Rest') {
                    countStr = `(${Math.floor(currentBeat)})`;
                } else {
                    const fraction = currentBeat % 1;
                    const beatNum = Math.floor(currentBeat);

                    if (fraction === 0) countStr = `${beatNum}`;
                    else if (fraction === 0.25) countStr = "ti";
                    else if (fraction === 0.5) countStr = "te";
                    else if (fraction === 0.75) countStr = "ta";
                    
                    if (dur >= 1.5) {
                        let arr = [countStr];
                        for(let i = 1; i < Math.floor(dur); i++) {
                            arr.push(`${beatNum + i}`);
                        }
                        countStr = arr.join("-");
                    }
                }

                currentBeat += dur;
                currentBeat = Math.round(currentBeat * 4) / 4;
                return { ...note, count: countStr };
            });
        }

        function fixAllMeasures(notes, beatsPerMeasure = 4) {
            let maxM = Math.max(...notes.map(n => n.m), 1);
            let fixed = [];

            for (let m = 1; m <= maxM; m++) {
                let mNotes = notes.filter(n => n.m === m);
                let currentBeats = 0;
                let validMNotes = [];

                for (let n of mNotes) {
                    let nBeats = durationMap[n.type];
                    if (currentBeats + nBeats <= beatsPerMeasure) {
                        validMNotes.push({...n, m}); 
                        currentBeats += nBeats;
                    } else {
                        let remainder = beatsPerMeasure - currentBeats;
                        if (remainder > 0) {
                            let newType = 'q';
                            if (remainder >= 4) newType = 'w';
                            else if (remainder >= 3) newType = 'dh';
                            else if (remainder >= 2) newType = 'h';
                            else if (remainder >= 1.5) newType = 'dq';
                            else if (remainder >= 1) newType = 'q';
                            else if (remainder >= 0.5) newType = 'e';
                            else newType = 's';
                            
                            if (n.pitch === 'Rest') newType += 'r';
                            validMNotes.push({...n, type: newType, m});
                            currentBeats += remainder;
                        }
                        break; 
                    }
                    currentBeats = Math.round(currentBeats * 4) / 4;
                }

                while (currentBeats < beatsPerMeasure) {
                    let remainder = beatsPerMeasure - currentBeats;
                    let rType = 'qr';
                    if (remainder >= 4) rType = 'wr';
                    else if (remainder >= 3) rType = 'dhr';
                    else if (remainder >= 2) rType = 'hr';
                    else if (remainder >= 1.5) rType = 'dqr';
                    else if (remainder >= 1) rType = 'qr';
                    else if (remainder >= 0.5) rType = 'er';
                    else rType = 'sr';
                    
                    validMNotes.push({ pitch: 'Rest', type: rType, lyric: '', m });
                    currentBeats += durationMap[rType];
                    currentBeats = Math.round(currentBeats * 4) / 4;
                }
                fixed.push(...validMNotes);
            }

            let finalized = [];
            for (let m = 1; m <= maxM; m++) {
                finalized.push(...calculateEastmanCounts(fixed.filter(n => n.m === m)));
            }
            return finalized;
        }

        function playTone(ctx, freq, time, dur) {
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.type = 'sine';
            osc.frequency.value = freq;
            
            gain.gain.setValueAtTime(0, time);
            gain.gain.linearRampToValueAtTime(0.6, time + 0.03); 
            gain.gain.setValueAtTime(0.6, time + dur - 0.05);
            gain.gain.linearRampToValueAtTime(0, time + dur);
            
            osc.start(time);
            osc.stop(time + dur);
        }

        const appAPI = {
            setMode: (mode) => {
                appAPI.stopSong();
                state.appMode = mode;
                if(mode === 'game') appAPI.generateGameNote();
                render();
            },

            // --- Game & Training Actions ---
            setTrainingPitch: (pitch) => {
                state.trainingPitch = pitch;
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                playTone(ctx, frequencies[pitch], ctx.currentTime, 0.5);
                setTimeout(() => ctx.close(), 1000);
                render();
            },
            toggleGamePool: (pitch) => {
                if(state.gamePool.includes(pitch)) {
                    state.gamePool = state.gamePool.filter(p => p !== pitch);
                } else {
                    state.gamePool.push(pitch);
                }
                render();
            },
            generateGameNote: () => {
                if(state.gamePool.length === 0) return;
                const randomPitch = state.gamePool[Math.floor(Math.random() * state.gamePool.length)];
                state.gameTargetPitch = randomPitch;
                state.gameShowAnswer = false;
                render();
            },
            toggleGameAnswer: () => {
                state.gameShowAnswer = !state.gameShowAnswer;
                if(state.gameShowAnswer && state.gameTargetPitch !== 'Rest') {
                    const ctx = new (window.AudioContext || window.webkitAudioContext)();
                    playTone(ctx, frequencies[state.gameTargetPitch], ctx.currentTime, 0.5);
                    setTimeout(() => ctx.close(), 1000);
                }
                render();
            },

            // --- Song Editor Actions ---
            loadSong: (id) => {
                appAPI.stopSong();
                state.selectedNoteIndex = null;
                state.currentSongId = id;
                const newSong = SONG_LIBRARY.find(s => s.id === id);
                state.songNotes = fixAllMeasures(newSong.notes, newSong.beatsPerMeasure);
                render();
            },

            stopSong: () => {
                if (audioCtxRef) {
                    audioCtxRef.close().catch(e => console.error(e));
                    audioCtxRef = null;
                }
                if (animationFrameId) cancelAnimationFrame(animationFrameId);
                state.isPlaying = false;
                state.activeNoteIndex = -1;
                render();
            },

            playSong: () => {
                appAPI.stopSong();
                state.selectedNoteIndex = null;
                render();

                setTimeout(() => {
                    const ctx = new (window.AudioContext || window.webkitAudioContext)();
                    audioCtxRef = ctx;
                    state.isPlaying = true;
                    render(); 

                    const currentSong = SONG_LIBRARY.find(s => s.id === state.currentSongId);
                    const beatDuration = 60 / state.tempo;
                    let time = ctx.currentTime + 0.5; 
                    const schedule = [];

                    const totalMeasures = Math.max(...state.songNotes.map(n => n.m), 1);

                    if (state.useMetronome) {
                        for (let m = 0; m < totalMeasures; m++) {
                            for (let b = 0; b < currentSong.beatsPerMeasure; b++) {
                                const osc = ctx.createOscillator();
                                const gain = ctx.createGain();
                                osc.connect(gain);
                                gain.connect(ctx.destination);
                                osc.type = 'square';
                                osc.frequency.setValueAtTime(b === 0 ? 1200 : 800, time + (m * currentSong.beatsPerMeasure + b) * beatDuration);
                                gain.gain.setValueAtTime(0, time + (m * currentSong.beatsPerMeasure + b) * beatDuration);
                                gain.gain.linearRampToValueAtTime(0.1, time + (m * currentSong.beatsPerMeasure + b) * beatDuration + 0.005);
                                gain.gain.exponentialRampToValueAtTime(0.001, time + (m * currentSong.beatsPerMeasure + b) * beatDuration + 0.05);
                                osc.start(time + (m * currentSong.beatsPerMeasure + b) * beatDuration);
                                osc.stop(time + (m * currentSong.beatsPerMeasure + b) * beatDuration + 0.05);
                            }
                        }
                    }

                    state.songNotes.forEach((note, i) => {
                        const beats = durationMap[note.type];
                        const durSecs = beats * beatDuration;

                        if (note.pitch !== 'Rest') {
                            playTone(ctx, frequencies[note.pitch], time, durSecs);
                        }
                        schedule.push({ index: i, time: time, duration: durSecs });
                        time += durSecs;
                    });

                    const updateUI = () => {
                        if (!audioCtxRef || audioCtxRef.state === 'closed') return;
                        const currTime = audioCtxRef.currentTime;
                        const active = schedule.find(s => currTime >= s.time && currTime < s.time + s.duration);

                        if (active) {
                            if (state.activeNoteIndex !== active.index) {
                                const oldHighlight = document.getElementById(`playback-highlight-${state.activeNoteIndex}`);
                                if(oldHighlight) {
                                    oldHighlight.classList.remove('opacity-80', 'bg-emerald-300', 'shadow-md', 'ring-4', 'ring-emerald-400', 'z-10');
                                    oldHighlight.classList.add('opacity-0');
                                }
                                state.activeNoteIndex = active.index;
                                const newHighlight = document.getElementById(`playback-highlight-${state.activeNoteIndex}`);
                                if(newHighlight) {
                                    newHighlight.classList.remove('opacity-0');
                                    newHighlight.classList.add('opacity-80', 'bg-emerald-300', 'shadow-md', 'ring-4', 'ring-emerald-400', 'z-10');
                                    newHighlight.scrollIntoView({ behavior: "smooth", block: "center", inline: "center" });
                                }
                            }
                            animationFrameId = requestAnimationFrame(updateUI);
                        } else if (currTime >= time) {
                            appAPI.stopSong();
                        } else {
                            animationFrameId = requestAnimationFrame(updateUI);
                        }
                    };
                    animationFrameId = requestAnimationFrame(updateUI);
                }, 50);
            },

            handleNoteClick: (globalIndex) => {
                if (state.isPlaying) appAPI.stopSong();
                state.selectedNoteIndex = globalIndex;
                const note = state.songNotes[globalIndex];
                render(); 

                if (note.pitch !== 'Rest') {
                    const ctx = new (window.AudioContext || window.webkitAudioContext)();
                    playTone(ctx, frequencies[note.pitch], ctx.currentTime, 0.5);
                    setTimeout(() => ctx.close(), 1000);
                }
            },

            editNote: (globalIndex, field, value) => {
                if (globalIndex === null || globalIndex < 0) return;
                let newNotes = [...state.songNotes];
                const note = { ...newNotes[globalIndex] };
                const currentSong = SONG_LIBRARY.find(s => s.id === state.currentSongId);

                if (field === 'pitch') {
                    newNotes[globalIndex] = { ...note, pitch: value };
                    if (value !== 'Rest') {
                        const ctx = new (window.AudioContext || window.webkitAudioContext)();
                        playTone(ctx, frequencies[value], ctx.currentTime, 0.5);
                        setTimeout(() => ctx.close(), 1000);
                    }
                    state.songNotes = newNotes;
                } 
                else if (field === 'lyric') {
                    newNotes[globalIndex] = { ...note, lyric: value };
                    state.songNotes = newNotes;
                }
                else if (field === 'baseDuration') {
                    const isRest = note.pitch === 'Rest';
                    const isDotted = note.type.includes('d');
                    let newType = isDotted ? `d${value}` : value;
                    if(isRest) newType += 'r';
                    note.type = newType;
                    newNotes[globalIndex] = note;
                    state.songNotes = fixAllMeasures(newNotes, currentSong.beatsPerMeasure);
                }
                else if (field === 'toggleDot') {
                    const isRest = note.pitch === 'Rest';
                    const hasDot = note.type.includes('d');
                    let base = note.type.replace('d', '').replace('r', '');
                    
                    if (hasDot) {
                        note.type = base + (isRest ? 'r' : '');
                    } else {
                        if (['q', 'h', 'e'].includes(base)) { 
                            note.type = `d${base}` + (isRest ? 'r' : '');
                        }
                    }
                    newNotes[globalIndex] = note;
                    state.songNotes = fixAllMeasures(newNotes, currentSong.beatsPerMeasure);
                }
                else if (field === 'toggleRest') {
                    note.pitch = note.pitch === 'Rest' ? 'G4' : 'Rest';
                    note.type = note.pitch === 'Rest' ? `${note.type.replace('r','')}r` : note.type.replace('r','');
                    newNotes[globalIndex] = note;
                    state.songNotes = fixAllMeasures(newNotes, currentSong.beatsPerMeasure);
                }
                
                render();
            },

            addMeasure: () => {
                const currentSong = SONG_LIBRARY.find(s => s.id === state.currentSongId);
                const maxM = Math.max(...state.songNotes.map(n => n.m), 0);
                const restType = currentSong.beatsPerMeasure === 4 ? 'wr' : 'dhr'; 
                
                state.songNotes.push({ pitch: 'Rest', type: restType, lyric: '', m: maxM + 1 });
                state.songNotes = fixAllMeasures(state.songNotes, currentSong.beatsPerMeasure);
                render();
            },

            removeMeasure: () => {
                const currentSong = SONG_LIBRARY.find(s => s.id === state.currentSongId);
                let targetM;
                if (state.selectedNoteIndex !== null && state.songNotes[state.selectedNoteIndex]) {
                    targetM = state.songNotes[state.selectedNoteIndex].m;
                } else {
                    targetM = Math.max(...state.songNotes.map(n => n.m), 0);
                }

                if (targetM <= 0) return;

                let newNotes = state.songNotes.filter(n => n.m !== targetM);
                newNotes = newNotes.map(n => n.m > targetM ? { ...n, m: n.m - 1 } : n);
                
                state.selectedNoteIndex = null;
                state.songNotes = fixAllMeasures(newNotes, currentSong.beatsPerMeasure);
                render();
            },

            exportSong: () => {
                const currentSong = SONG_LIBRARY.find(s => s.id === state.currentSongId);
                const exportData = {
                    title: currentSong.title + " (Custom)",
                    beatsPerMeasure: currentSong.beatsPerMeasure,
                    notes: state.songNotes.map(n => ({ pitch: n.pitch, type: n.type, lyric: n.lyric || "", m: n.m }))
                };
                const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(exportData, null, 2));
                const downloadNode = document.createElement('a');
                downloadNode.setAttribute("href", dataStr);
                downloadNode.setAttribute("download", (currentSong.title.replace(/\s+/g, '_')) + "_Custom.json");
                document.body.appendChild(downloadNode);
                downloadNode.click();
                downloadNode.remove();
            },

            handleFileUpload: (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const ext = file.name.split('.').pop().toLowerCase();

                if (ext === 'json') {
                    const reader = new FileReader();
                    reader.onload = (evt) => {
                        try {
                            const customSong = JSON.parse(evt.target.result);
                            SONG_LIBRARY.push({
                                id: SONG_LIBRARY.length + 1,
                                title: customSong.title || 'Custom Upload',
                                belt: 'Custom',
                                beatsPerMeasure: customSong.beatsPerMeasure || 4,
                                notes: customSong.notes
                            });
                            appAPI.loadSong(SONG_LIBRARY.length);
                        } catch (err) {
                            alert('Invalid JSON format.');
                        }
                    };
                    reader.readAsText(file);
                } else {
                    let type = file.type;
                    if (!type) {
                        if (['png', 'jpg', 'jpeg', 'gif', 'bmp', 'tiff', 'tif'].includes(ext)) type = 'image/' + ext;
                        else if (ext === 'pdf') type = 'application/pdf';
                    }
                    
                    state.referenceFileUrl = URL.createObjectURL(file);
                    state.referenceFileType = type;
                    state.refZoom = 1;
                    
                    e.target.value = null; 
                    render();
                }
            },

            closeReference: () => {
                if(state.referenceFileUrl) URL.revokeObjectURL(state.referenceFileUrl);
                state.referenceFileUrl = null;
                state.referenceFileType = null;
                state.refZoom = 1;
                render();
            },
            
            zoomRef: (amount) => {
                state.refZoom = Math.max(0.5, Math.min(5, state.refZoom + amount));
                render();
            },

            setToggle: (field, val) => { state[field] = val; render(); },
            setTempo: (val) => { state.tempo = Number(val); render(); },

            dragStart: (e, index) => {
                state.draggedIndex = index;
                e.dataTransfer.effectAllowed = 'move';
                state.selectedNoteIndex = index;
                setTimeout(() => { render(); }, 0); 
            },
            dragOver: (e, index) => {
                e.preventDefault();
                const el = document.getElementById(`drop-target-${index}`);
                if(el) {
                    el.classList.remove('opacity-0');
                    el.classList.add('bg-amber-200', 'border-4', 'border-dashed', 'border-amber-500', 'scale-110', 'z-20');
                }
            },
            dragLeave: (e, index) => {
                const el = document.getElementById(`drop-target-${index}`);
                if(el) {
                    el.classList.add('opacity-0');
                    el.classList.remove('bg-amber-200', 'border-4', 'border-dashed', 'border-amber-500', 'scale-110', 'z-20');
                }
            },
            drop: (e, dropIndex) => {
                e.preventDefault();
                if (state.draggedIndex === null || state.draggedIndex === dropIndex) {
                    state.draggedIndex = null;
                    render();
                    return;
                }

                let newNotes = [...state.songNotes];
                const [draggedNote] = newNotes.splice(state.draggedIndex, 1);
                const targetMeasure = state.songNotes[dropIndex].m;
                draggedNote.m = targetMeasure; 
                
                newNotes.splice(dropIndex, 0, draggedNote);
                const currentSong = SONG_LIBRARY.find(s => s.id === state.currentSongId);
                state.songNotes = fixAllMeasures(newNotes, currentSong.beatsPerMeasure);
                state.draggedIndex = null;
                state.selectedNoteIndex = dropIndex;
                render();
            }
        };

        window.app = appAPI;

        window.addEventListener('keydown', (e) => {
            if (state.appMode !== 'song') return; // Only process keybinds in Song Editor mode
            if (document.activeElement.tagName === 'INPUT') return;
            if (state.selectedNoteIndex === null) return;
            
            const note = state.songNotes[state.selectedNoteIndex];
            
            // Navigation
            if (e.key === 'ArrowRight') {
                e.preventDefault();
                if (state.selectedNoteIndex < state.songNotes.length - 1) {
                    appAPI.handleNoteClick(state.selectedNoteIndex + 1);
                    setTimeout(() => {
                        const targetEl = document.getElementById(`drop-target-${state.selectedNoteIndex + 1}`);
                        if(targetEl) targetEl.scrollIntoView({ behavior: "smooth", block: "center", inline: "center" });
                    }, 50);
                }
            } 
            else if (e.key === 'ArrowLeft') {
                e.preventDefault();
                if (state.selectedNoteIndex > 0) {
                    appAPI.handleNoteClick(state.selectedNoteIndex - 1);
                    setTimeout(() => {
                        const targetEl = document.getElementById(`drop-target-${state.selectedNoteIndex - 1}`);
                        if(targetEl) targetEl.scrollIntoView({ behavior: "smooth", block: "center", inline: "center" });
                    }, 50);
                }
            } 
            // Pitch Modification
            else if (e.key === 'ArrowUp' && note.pitch !== 'Rest') {
                e.preventDefault();
                const i = PITCHES.indexOf(note.pitch);
                if (i < PITCHES.length - 1) appAPI.editNote(state.selectedNoteIndex, 'pitch', PITCHES[i+1]);
            } 
            else if (e.key === 'ArrowDown' && note.pitch !== 'Rest') {
                e.preventDefault();
                const i = PITCHES.indexOf(note.pitch);
                if (i > 0) appAPI.editNote(state.selectedNoteIndex, 'pitch', PITCHES[i-1]);
            }
            // Rhythm Modification
            else if (e.key === '2') { e.preventDefault(); appAPI.editNote(state.selectedNoteIndex, 'baseDuration', 's'); }
            else if (e.key === '3') { e.preventDefault(); appAPI.editNote(state.selectedNoteIndex, 'baseDuration', 'e'); }
            else if (e.key === '4') { e.preventDefault(); appAPI.editNote(state.selectedNoteIndex, 'baseDuration', 'q'); }
            else if (e.key === '5') { e.preventDefault(); appAPI.editNote(state.selectedNoteIndex, 'baseDuration', 'h'); }
            else if (e.key === '6') { e.preventDefault(); appAPI.editNote(state.selectedNoteIndex, 'baseDuration', 'w'); }
            else if (e.key === '.') { e.preventDefault(); appAPI.editNote(state.selectedNoteIndex, 'toggleDot', null); }
            else if (e.key === '0') { e.preventDefault(); appAPI.editNote(state.selectedNoteIndex, 'toggleRest', null); }
        });


        // --- Render Functions ---
        function getFingeringHTML(pitch, showLabels = true) {
            const fingering = fingerings[pitch];
            if (!fingering || pitch === 'Rest') return '';

            const labels = ['1', '2', '3', '1', '2', '3', 'Pinky'];

            const holes = [1, 2, 3, 4, 5, 6, 7].map((hole, index) => `
                <div class="flex items-center relative w-full justify-center">
                    ${showLabels ? `<span class="absolute right-10 text-[11px] font-extrabold text-slate-500 whitespace-nowrap">${labels[index]}</span>` : ''}
                    <div class="w-[18px] h-[18px] rounded-full border-[3px] border-slate-300 transition-all ${fingering.holes.includes(hole) ? 'bg-slate-800 scale-110' : 'bg-slate-100'} z-10"></div>
                </div>
            `).join('');

            return `
                <div class="flex flex-col items-center w-32 drop-shadow-xl pointer-events-none">
                    <div class="w-14 h-12 bg-red-600 border-4 border-red-800 rounded-t-[2rem] relative shadow-inner">
                        <div class="absolute w-6 h-5 bg-red-950 rounded-md top-3 left-1/2 -translate-x-1/2 shadow-inner"></div>
                    </div>
                    <div class="w-14 h-[270px] bg-slate-50 border-x-4 border-slate-300 flex flex-col items-center py-2 gap-3 relative shadow-[inset_0_0_10px_rgba(0,0,0,0.1)]">
                        <div class="absolute -left-12 top-6 flex flex-col items-center">
                            ${showLabels ? `<span class="text-[11px] font-extrabold mb-1 text-slate-500 whitespace-nowrap">Thumb</span>` : ''}
                            <div class="w-6 h-6 rounded-full border-4 border-slate-300 transition-all ${fingering.thumb ? 'bg-slate-800 scale-110' : 'bg-white'} z-10"></div>
                        </div>
                        ${holes}
                    </div>
                    <div class="w-20 h-14 bg-red-600 border-4 border-red-800 rounded-b-2xl relative shadow-inner" style="clip-path: polygon(15% 0, 85% 0, 100% 100%, 0 100%)">
                        <div class="absolute inset-x-3 bottom-1 h-3 bg-red-900/40 rounded-full blur-sm"></div>
                    </div>
                </div>
            `;
        }

        function getNoteSVGHTML(note, isBeamed, forceStemDown) {
            const naturalStemDown = ['B4', 'C5', 'D5'].includes(note.pitch);
            const isStemDown = isBeamed ? forceStemDown : naturalStemDown;
            const pitchY = pitchOffsets[note.pitch];
            const isHollow = ['h', 'dh', 'w'].includes(note.type);
            const isDotted = note.type.includes('d');

            if (note.pitch === 'Rest') {
                let restContent = '';
                if (note.type === 'qr') restContent = `<path d="M -4 -12 L 2 -4 L -4 4 L 0 12 C 0 16, -4 18, -6 14" fill="none" stroke="#334155" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />`;
                else if (note.type === 'dqr') restContent = `<g><path d="M -4 -12 L 2 -4 L -4 4 L 0 12 C 0 16, -4 18, -6 14" fill="none" stroke="#334155" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" /><circle cx="12" cy="0" r="2.5" fill="#334155" /></g>`;
                else if (note.type === 'sr') restContent = `<g stroke="#334155" stroke-width="2.5" fill="none" stroke-linecap="round"><line x1="2" y1="-10" x2="-4" y2="16" /><path d="M 2 -10 C -4 -10, -6 -6, 0 -2" /><path d="M 0 -2 C -6 -2, -8 2, -2 6" /></g>`;
                else if (note.type === 'hr' || note.type === 'dhr') restContent = `<g><rect x="-6" y="-6" width="12" height="6" fill="#334155" />${note.type === 'dhr' ? '<circle cx="12" cy="-3" r="2.5" fill="#334155" />' : ''}</g>`;
                else if (note.type === 'wr') restContent = `<rect x="-6" y="0" width="12" height="6" fill="#334155" />`;
                else if (note.type === 'er') restContent = `<path d="M -2 -10 A 3 3 0 1 1 -2 -4 L -6 12" fill="none" stroke="#334155" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />`;

                return `<svg width="24" height="60" class="absolute -translate-x-1/2 left-1/2 overflow-visible pointer-events-none" style="top: ${pitchY}px">${restContent}</svg>`;
            }

            const hasSingleFlag = !isBeamed && note.type === 'e';
            const hasDoubleFlag = !isBeamed && note.type === 's';

            let parts = '';
            if (note.pitch === 'C4') parts += `<line x1="-12" y1="0" x2="12" y2="0" stroke="#1A202C" stroke-width="2" />`;
            if (note.pitch.includes('#')) parts += `<text x="-20" y="5" font-size="18" font-family="sans-serif" fill="#1A202C" font-weight="bold">♯</text>`;
            parts += `<ellipse cx="0" cy="0" rx="6.5" ry="4.5" transform="rotate(-20)" fill="${isHollow ? 'white' : '#1A202C'}" stroke="#1A202C" stroke-width="2.5" />`;

            if (!isBeamed && note.type !== 'w') {
                if (!isStemDown) parts += `<rect x="5.5" y="-35" width="2" height="35" fill="#1A202C" />`;
                else parts += `<rect x="-7.5" y="0" width="2" height="35" fill="#1A202C" />`;
            }

            if (hasSingleFlag && !isStemDown) parts += `<path d="M 5.5 -35 C 14 -30, 18 -15, 12 -5 C 15 -15, 11 -25, 7.5 -35" fill="#1A202C" />`;
            if (hasSingleFlag && isStemDown) parts += `<path d="M -5.5 35 C 3 30, 7 15, 1 5 C 4 15, 0 25, -3.5 35" fill="#1A202C" />`;

            if (hasDoubleFlag && !isStemDown) parts += `<g><path d="M 5.5 -35 C 14 -30, 18 -15, 12 -5 C 15 -15, 11 -25, 7.5 -35" fill="#1A202C" /><path d="M 5.5 -25 C 14 -20, 18 -5, 12 5 C 15 -5, 11 -15, 7.5 -25" fill="#1A202C" /></g>`;
            if (hasDoubleFlag && isStemDown) parts += `<g><path d="M -5.5 35 C 3 30, 7 15, 1 5 C 4 15, 0 25, -3.5 35" fill="#1A202C" /><path d="M -5.5 25 C 3 20, 7 5, 1 -5 C 4 5, 0 15, -3.5 25" fill="#1A202C" /></g>`;

            if (isDotted) parts += `<circle cx="15" cy="-2" r="2.5" fill="#1A202C" />`;

            return `<svg width="2" height="2" class="absolute -translate-x-1/2 left-1/2 overflow-visible pointer-events-none" style="top: ${pitchY}px">${parts}</svg>`;
        }

        const ICONS = {
            quarter: `<svg width="24" height="24" viewBox="0 0 24 24" class="fill-current stroke-current overflow-visible"><ellipse cx="9" cy="18" rx="4" ry="3" transform="rotate(-20 9 18)" stroke="none" /><line x1="12.5" y1="18" x2="12.5" y2="4" stroke-width="2"/></svg>`,

            sixteenth: `<svg width="24" height="24" viewBox="0 0 24 24" class="fill-current stroke-current overflow-visible"><ellipse cx="9" cy="18" rx="4" ry="3" transform="rotate(-20 9 18)" stroke="none" /><line x1="12.5" y1="18" x2="12.5" y2="4" stroke-width="2"/><path d="M 12.5 4 C 18 6, 18 12, 14 16 C 16 10, 16 6, 12.5 4" stroke="none" /><path d="M 12.5 10 C 18 12, 18 18, 14 22 C 16 16, 16 12, 12.5 10" stroke="none" /></svg>`,
            dot: `<svg width="24" height="24" viewBox="0 0 24 24" class="fill-current"><circle cx="12" cy="12" r="3" /></svg>`,
            rest: `<svg width="24" height="24" viewBox="0 0 24 24" class="fill-none stroke-current"><path d="M 9 6 L 13 10 L 9 14 L 11 18 C 11 20, 8 20, 7 18" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" /></svg>`
        };

        // === VIEW RENDERERS ===

        function renderNav() {

                <div class="w-full bg-indigo-950 p-3 flex justify-center gap-4 text-white z-50 shrink-0 shadow-md">
                    <button onclick="app.setMode('song')" class="px-5 py-2 rounded-xl font-bold flex items-center transition-colors ${state.appMode==='song' ? 'bg-indigo-600 text-white' : 'text-indigo-200 hover:bg-indigo-800'}">

        // --- MODE: SONG EDITOR ---
        function renderSongMode() {
            return renderSidebar() + renderSheetMusic();
        }

        function renderSidebar() {
            const currentSong = SONG_LIBRARY.find(s => s.id === state.currentSongId);
            const selectedNote = state.selectedNoteIndex !== null ? state.songNotes[state.selectedNoteIndex] : null;
            const songOptions = SONG_LIBRARY.map(s => `<option value="${s.id}" ${s.id === state.currentSongId ? 'selected' : ''}>${s.id}. ${s.title} (${s.belt})</option>`).join('');

            let editorPanel = '';
            if (selectedNote) {
                const pitchUp = PITCHES.indexOf(selectedNote.pitch) < PITCHES.length - 1 ? `<button onclick="app.editNote(${state.selectedNoteIndex}, 'pitch', '${PITCHES[PITCHES.indexOf(selectedNote.pitch)+1]}')" class="p-2 bg-indigo-50 rounded-lg shadow-sm border-2 border-indigo-200 active:scale-95 transition-transform"><i data-lucide="chevron-up" class="text-indigo-700 w-5 h-5"></i></button>` : '';
                const pitchDown = PITCHES.indexOf(selectedNote.pitch) > 0 ? `<button onclick="app.editNote(${state.selectedNoteIndex}, 'pitch', '${PITCHES[PITCHES.indexOf(selectedNote.pitch)-1]}')" class="p-2 bg-indigo-50 rounded-lg shadow-sm border-2 border-indigo-200 active:scale-95 transition-transform"><i data-lucide="chevron-down" class="text-indigo-700 w-5 h-5"></i></button>` : '';
                
                const baseType = selectedNote.type.replace('d', '').replace('r', '');
                const hasDot = selectedNote.type.includes('d');
                const isRest = selectedNote.pitch === 'Rest';

                const keypadHTML = `
                    <div class="grid grid-cols-3 gap-2 w-full relative mt-2">

                        <button onclick="app.editNote(${state.selectedNoteIndex}, 'baseDuration', 'h')" class="keypad-btn ${baseType === 'h' ? 'active-note' : ''}">${ICONS.half}<span class="shortcut-hint">5</span></button>
                        <button onclick="app.editNote(${state.selectedNoteIndex}, 'baseDuration', 'w')" class="keypad-btn ${baseType === 'w' ? 'active-note' : ''}">${ICONS.whole}<span class="shortcut-hint">6</span></button>
                        
                        <button onclick="app.editNote(${state.selectedNoteIndex}, 'baseDuration', 's')" class="keypad-btn ${baseType === 's' ? 'active-note' : ''}">${ICONS.sixteenth}<span class="shortcut-hint">2</span></button>
                        <button onclick="app.editNote(${state.selectedNoteIndex}, 'baseDuration', 'e')" class="keypad-btn ${baseType === 'e' ? 'active-note' : ''}">${ICONS.eighth}<span class="shortcut-hint">3</span></button>
                        <button onclick="app.editNote(${state.selectedNoteIndex}, 'toggleDot', null)" class="keypad-btn ${hasDot ? 'active-note' : ''}">${ICONS.dot}<span class="shortcut-hint">.</span></button>

                        ${keypadHTML}

            } else {
                editorPanel = `

                        <i data-lucide="arrow-left-right" class="w-12 h-12 text-slate-300 mb-4"></i>

                        <p class="text-[15px] font-bold text-slate-400/80 leading-snug">
                            Tap any note to view its <span class="text-indigo-400">Fingering Chart</span> and open the keypad editor!
                        </p>
                    </div>
                `;
            }

            return `
                <div class="w-full xl:w-[320px] bg-white p-5 rounded-[2rem] shadow-2xl flex flex-col gap-4 shrink-0 border-[4px] border-indigo-100 h-full overflow-y-auto hide-scrollbar z-40">
                    <div class="flex flex-col gap-2">

                            <i data-lucide="music" class="w-4 h-4"></i> Song Library

                    <div class="bg-slate-50 p-4 rounded-2xl border-2 border-slate-200 flex flex-col items-center shadow-inner relative transition-colors shrink-0">

                            </div>
                            <input type="range" min="50" max="130" value="${state.tempo}" onchange="app.setTempo(this.value)" />

                    </div>

                    <div class="mt-2 border-t-2 border-indigo-100 pt-4 flex flex-col gap-3 pb-4">
                        <div class="flex gap-2 w-full">
                            <button onclick="app.addMeasure()" class="flex-1 py-2 bg-slate-200 hover:bg-slate-300 text-slate-700 font-bold rounded-lg flex items-center justify-center gap-1 shadow-sm transition-colors">

                            </button>

                                <i data-lucide="minus" class="w-4 h-4"></i> Measure
                            </button>
                        </div>

                        <button onclick="app.exportSong()" class="w-full py-2 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-lg flex items-center justify-center gap-2 shadow-sm transition-colors">
                            <i data-lucide="download" class="w-4 h-4"></i> Save Song to Device
                        </button>
                        
                        <div>
                            <label class="text-xs font-bold text-indigo-800 uppercase flex items-center gap-1 mb-2">
                                <i data-lucide="file-up" class="w-4 h-4"></i> Ref Score / Import

        }

        function renderSheetMusic() {
            const currentSong = SONG_LIBRARY.find(s => s.id === state.currentSongId);
            let noteCounter = 0;
            const totalMeasures = Math.max(...state.songNotes.map(n => n.m), 1);
            let measuresHTML = '';

            for (let i = 0; i < totalMeasures; i++) {
                const measureNotes = state.songNotes.filter(n => n.m === i + 1);
                
                let currentPct = 0;
                const positionedNotes = measureNotes.map(n => {
                    const globalIndex = noteCounter++;
                    const widthPct = (durationMap[n.type] / currentSong.beatsPerMeasure) * 100;
                    const res = { ...n, globalIndex, widthPct, centerPct: currentPct + (widthPct / 2) };
                    currentPct += widthPct;
                    return res;
                });

                let beamGroups = [];
                let currentGroup = [];
                let beatAccumulator = 0;

                positionedNotes.forEach((note) => {
                    const dur = durationMap[note.type];
                    const isBeammable = ['e', 's'].includes(note.type) && note.pitch !== 'Rest';
                    if (isBeammable) currentGroup.push(note);
                    beatAccumulator += dur;
                    if (!isBeammable || beatAccumulator % 1 === 0 || beatAccumulator >= currentSong.beatsPerMeasure) {
                        if (currentGroup.length > 1) beamGroups.push([...currentGroup]);
                        currentGroup = [];
                    }
                });

                let beamSVGContent = '';
                beamGroups.forEach((group) => {
                    const avgPitchIndex = group.reduce((sum, n) => sum + PITCHES.indexOf(n.pitch), 0) / group.length;
                    const stemDown = avgPitchIndex >= PITCHES.indexOf('B4');
                    const extremePitchY = stemDown
                        ? Math.max(...group.map(n => pitchOffsets[n.pitch]))
                        : Math.min(...group.map(n => pitchOffsets[n.pitch]));
                    const beamY = stemDown ? extremePitchY + 35 : extremePitchY - 35;
                    const secondaryBeamY = stemDown ? beamY - 8 : beamY + 8;
                    const getX = (pct) => `calc(${pct}% ${stemDown ? '- 6.5px' : '+ 5.5px'})`;
                    const firstX = getX(group[0].centerPct);
                    const lastX = getX(group[group.length - 1].centerPct);

                    let elements = '';
                    group.forEach((n) => {
                        elements += `<line x1="${getX(n.centerPct)}" y1="${pitchOffsets[n.pitch]}" x2="${getX(n.centerPct)}" y2="${beamY}" stroke="#1A202C" stroke-width="2" />`;
                    });
                    elements += `<line x1="${firstX}" y1="${beamY}" x2="${lastX}" y2="${beamY}" stroke="#1A202C" stroke-width="4" />`;
                    
                    for (let idx = 0; idx < group.length; idx++) {
                        if (group[idx].type === 's') {
                            let startX = getX(group[idx].centerPct);
                            if (idx < group.length - 1 && group[idx+1].type === 's') {
                                elements += `<line x1="${startX}" y1="${secondaryBeamY}" x2="${getX(group[idx+1].centerPct)}" y2="${secondaryBeamY}" stroke="#1A202C" stroke-width="4" />`;
                            } else if (idx > 0 && group[idx-1].type === 's') {
                                // Handled by previous
                            } else {
                                const stubOffset = idx === 0 ? '10px' : '-10px';
                                elements += `<line x1="${startX}" y1="${secondaryBeamY}" x2="calc(${startX} + ${stubOffset})" y2="${secondaryBeamY}" stroke="#1A202C" stroke-width="4" />`;
                            }
                        }
                    }
                    beamSVGContent += `<g>${elements}</g>`;
                });

                const notesHTML = positionedNotes.map(note => {
                    const globalIndex = note.globalIndex;
                    const isSelected = state.selectedNoteIndex === globalIndex;
                    const isDragged = state.draggedIndex === globalIndex;
                    
                    const isBeamed = beamGroups.some(g => g.some(n => n.globalIndex === globalIndex));
                    let groupStemDown = false;
                    if (isBeamed) {
                        const group = beamGroups.find(g => g.some(n => n.globalIndex === globalIndex));
                        const avgPitchIndex = group.reduce((sum, n) => sum + PITCHES.indexOf(n.pitch), 0) / group.length;
                        groupStemDown = avgPitchIndex >= PITCHES.indexOf('B4');
                    }

                    const noteSVG = getNoteSVGHTML(note, isBeamed, groupStemDown);

                    const inputHtml = state.showLyrics ? `
                        <input type="text" value="${note.lyric || ''}" 
                               onchange="app.editNote(${globalIndex}, 'lyric', this.value)" 
                               onclick="event.stopPropagation(); app.handleNoteClick(${globalIndex})" 
                               placeholder="${note.pitch !== 'Rest' ? 'word...' : ''}" 
                               class="text-[14px] font-extrabold text-slate-800 tracking-tight leading-[1.1] text-center w-[150%] bg-transparent border-none outline-none hover:bg-white/60 focus:bg-white focus:ring-2 focus:ring-indigo-400 rounded cursor-text transition-all placeholder:text-slate-300/50" />
                    ` : '';

                    const countsHtml = state.showCounts ? `<span class="text-[14px] font-black text-sky-600 leading-[1.1] pointer-events-none">${note.count}</span>` : '';
                    const lettersHtml = state.showLetters && note.pitch !== 'Rest' ? `<span class="text-[14px] font-black text-rose-600 leading-[1.1] pointer-events-none">${note.pitch.replace('4', '').replace('5','')}</span>` : '';

                    return `
                        <div draggable="true" 
                             ondragstart="app.dragStart(event, ${globalIndex})"
                             ondragover="app.dragOver(event, ${globalIndex})"
                             ondragleave="app.dragLeave(event, ${globalIndex})"
                             ondrop="app.drop(event, ${globalIndex})"
                             onclick="app.handleNoteClick(${globalIndex})"
                             style="width: ${note.widthPct}%"
                             class="relative cursor-pointer transition-all duration-150 group flex justify-center rounded-xl hover:bg-indigo-50 ${isDragged ? 'opacity-30' : 'opacity-100'}">
                            
                            <div class="absolute top-[16px] h-[86px] w-12 left-1/2 -translate-x-1/2 rounded-xl transition-all duration-75 ${isSelected ? 'bg-indigo-200 border-2 border-indigo-400' : 'opacity-0'}"></div>
                            
                            <div id="drop-target-${globalIndex}" class="absolute top-[16px] h-[86px] w-12 left-1/2 -translate-x-1/2 rounded-xl transition-all duration-75 opacity-0"></div>
                            <div id="playback-highlight-${globalIndex}" class="absolute top-[16px] h-[86px] w-12 left-1/2 -translate-x-1/2 rounded-xl transition-all duration-75 opacity-0"></div>

                            <div class="z-10 w-full h-full relative pointer-events-none">
                                ${noteSVG}
                            </div>
                            <div class="absolute top-[96px] flex flex-col items-center w-full z-30 gap-0.5">
                                ${inputHtml}
                                ${countsHtml}
                                ${lettersHtml}
                            </div>
                        </div>
                    `;
                }).join('');

                measuresHTML += `
                    <div class="relative flex w-full h-[150px] select-none">
                        <div class="absolute inset-x-0 top-[32px] border-t-[2px] border-slate-700/50 pointer-events-none"></div>
                        <div class="absolute inset-x-0 top-[44px] border-t-[2px] border-slate-700/50 pointer-events-none"></div>
                        <div class="absolute inset-x-0 top-[56px] border-t-[2px] border-slate-700/50 pointer-events-none"></div>
                        <div class="absolute inset-x-0 top-[68px] border-t-[2px] border-slate-700/50 pointer-events-none"></div>
                        <div class="absolute inset-x-0 top-[80px] border-t-[2px] border-slate-700/50 pointer-events-none"></div>

                        <div class="absolute right-0 top-[32px] h-[48px] border-r-[2px] border-slate-700 z-10 pointer-events-none"></div>
                        ${i % 4 === 0 ? '<div class="absolute left-0 top-[32px] h-[48px] border-l-[2px] border-slate-700 z-10 pointer-events-none"></div>' : ''}
                        ${i === totalMeasures - 1 ? '<div class="absolute right-1.5 top-[32px] h-[48px] border-r-4 border-slate-700 z-10 pointer-events-none"></div>' : ''}

                        ${i === 0 ? `
                            <span class="absolute -top-[16px] left-2 text-[70px] leading-none text-slate-800 z-10 pointer-events-none">&#119070;</span>
                            <div class="absolute left-[52px] top-[32px] flex flex-col font-serif text-2xl font-bold leading-[24px] text-slate-800 z-10 pointer-events-none">
                                <span>${currentSong.beatsPerMeasure}</span><span>4</span>
                            </div>
                        ` : ''}

                        <svg class="absolute inset-0 w-full h-full pointer-events-none z-20 overflow-visible">${beamSVGContent}</svg>

                        <div class="absolute inset-0 flex items-stretch ${i === 0 ? 'pl-[76px]' : ''}">
                            ${notesHTML}
                        </div>
                    </div>
                `;
            }

            if (state.referenceFileUrl) {
                const isImage = state.referenceFileType.startsWith('image/');
                
                let fileViewerHtml = '';
                if (isImage) {
                    fileViewerHtml = `
                        <div class="absolute top-4 right-4 flex flex-col gap-2 z-30">
                            <button onclick="app.zoomRef(0.25)" class="bg-indigo-600 hover:bg-indigo-500 text-white w-10 h-10 rounded-full shadow-lg font-black text-2xl leading-none flex items-center justify-center border-2 border-indigo-400">+</button>
                            <button onclick="app.zoomRef(-0.25)" class="bg-indigo-600 hover:bg-indigo-500 text-white w-10 h-10 rounded-full shadow-lg font-black text-2xl leading-none flex items-center justify-center border-2 border-indigo-400">-</button>
                        </div>
                        <div class="w-full h-full overflow-auto flex items-start justify-center p-4">
                            <img src="${state.referenceFileUrl}" style="transform: scale(${state.refZoom}); transform-origin: top center; transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);" class="max-w-none shadow-2xl bg-white" />
                        </div>
                    `;
                } else if (state.referenceFileType === 'application/pdf') {
                    fileViewerHtml = `<embed src="${state.referenceFileUrl}#toolbar=0" type="application/pdf" class="w-full h-full border-none bg-white" />`;
                } else {
                    fileViewerHtml = `<iframe src="${state.referenceFileUrl}" class="w-full h-full border-none bg-white"></iframe>`;
                }

                return `
                    <div class="flex-1 flex gap-4 h-full min-h-0">
                        <div class="flex-1 flex flex-col bg-white rounded-[2rem] shadow-xl border-[4px] border-slate-200 overflow-hidden relative min-h-0">
                            <div class="bg-indigo-900 text-white font-bold p-2 flex justify-between items-center z-10 shadow-md px-4 shrink-0">
                                <span class="flex items-center gap-2">
                                    <i data-lucide="file-text" class="w-4 h-4"></i> Reference Score
                                </span>
                                <button onclick="app.closeReference()" class="text-rose-300 hover:text-rose-100 flex items-center"><i data-lucide="x" class="w-5 h-5"></i></button>
                            </div>
                            <div class="flex-1 bg-slate-800 w-full h-full relative overflow-hidden flex flex-col min-h-0">
                                ${fileViewerHtml}
                            </div>
                        </div>
                        
                        <div class="flex-1 overflow-y-auto bg-white p-6 rounded-[2rem] shadow-xl border-[4px] border-slate-200 relative hide-scrollbar">
                            <div class="grid grid-cols-1 gap-y-16 gap-x-0 w-full">
                                ${measuresHTML}
                            </div>
                        </div>
                    </div>
                `;
            }

            return `
                <div class="flex-1 overflow-y-auto bg-white p-6 md:p-10 rounded-[2rem] shadow-xl border-[6px] border-slate-200 relative hide-scrollbar min-h-0">
                    <div class="max-w-[1600px] mx-auto grid grid-cols-1 lg:grid-cols-2 xl:grid-cols-4 gap-y-16 gap-x-0">
                        ${measuresHTML}
                    </div>
                </div>
            `;
        }

        // --- MODE: TRAINING ---
        function renderTrainingMode() {
            return `
                <div class="w-full xl:w-[320px] bg-white p-6 rounded-[2rem] shadow-2xl flex flex-col gap-4 border-[4px] border-indigo-100 shrink-0">
                    <h2 class="text-2xl font-black text-indigo-900 flex items-center gap-2 border-b-2 border-slate-100 pb-2"><i data-lucide="book-open"></i> Note Trainer</h2>
                    <p class="text-sm font-bold text-slate-500 mb-2">Select a pitch below to view its fingering chart.</p>
                    <div class="grid grid-cols-2 gap-3">
                        ${PITCHES.map(p => `
                            <button onclick="app.setTrainingPitch('${p}')" class="py-4 font-black text-xl rounded-xl border-4 transition-transform active:scale-95 ${state.trainingPitch === p ? 'bg-emerald-100 border-emerald-500 text-emerald-800 shadow-md' : 'bg-slate-50 border-slate-200 text-slate-600 hover:bg-slate-100'}">
                                ${p.replace('4','').replace('5','')}
                            </button>
                        `).join('')}
                    </div>
                </div>
                
                <div class="flex-1 bg-white rounded-[2rem] shadow-xl border-[6px] border-slate-200 flex flex-col items-center justify-center p-8 relative overflow-hidden">
                    <div class="absolute top-8 left-12 text-6xl font-black text-slate-200 pointer-events-none">${state.trainingPitch.replace('4','').replace('5','')}</div>
                    
                    <div class="flex flex-col xl:flex-row items-center justify-center gap-16 xl:gap-32 w-full">
                        <!-- Giant Staff -->
                        <div class="relative w-[300px] h-[160px] transform scale-[1.5]">
                            <div class="absolute inset-x-0 top-[32px] border-t-[2px] border-slate-700/50 pointer-events-none"></div>
                            <div class="absolute inset-x-0 top-[44px] border-t-[2px] border-slate-700/50 pointer-events-none"></div>
                            <div class="absolute inset-x-0 top-[56px] border-t-[2px] border-slate-700/50 pointer-events-none"></div>
                            <div class="absolute inset-x-0 top-[68px] border-t-[2px] border-slate-700/50 pointer-events-none"></div>
                            <div class="absolute inset-x-0 top-[80px] border-t-[2px] border-slate-700/50 pointer-events-none"></div>
                            <span class="absolute -top-[16px] left-2 text-[70px] leading-none text-slate-800 pointer-events-none">&#119070;</span>
                            
                            <div class="absolute left-1/2">
                                ${getNoteSVGHTML({pitch: state.trainingPitch, type: 'w'}, false, false)}
                            </div>
                        </div>

                        <!-- Giant Fingering -->
                        <div class="transform scale-[1.5]">
                            ${getFingeringHTML(state.trainingPitch, true)}
                        </div>
                    </div>
                </div>
            `;
        }

        // --- MODE: GAME ---
        function renderGameMode() {
            return `
                <div class="w-full xl:w-[320px] bg-white p-6 rounded-[2rem] shadow-2xl flex flex-col gap-4 border-[4px] border-indigo-100 shrink-0">
                    <h2 class="text-2xl font-black text-indigo-900 flex items-center gap-2 border-b-2 border-slate-100 pb-2"><i data-lucide="gamepad-2"></i> Game Setup</h2>
                    <p class="text-sm font-bold text-slate-500">Select which notes you want to test the students on:</p>
                    
                    <div class="grid grid-cols-2 gap-2 mb-2">
                        ${PITCHES.map(p => `
                            <label class="flex items-center gap-2 p-3 bg-slate-50 rounded-xl border-2 border-slate-200 cursor-pointer hover:bg-indigo-50 transition-colors">
                                <input type="checkbox" ${state.gamePool.includes(p)?'checked':''} onchange="app.toggleGamePool('${p}')" class="w-5 h-5 accent-indigo-600">
                                <span class="font-black text-lg text-slate-700">${p.replace('4','').replace('5','')}</span>
                            </label>
                        `).join('')}
                    </div>

                    <button onclick="app.generateGameNote()" class="py-4 mt-auto bg-indigo-600 hover:bg-indigo-700 text-white font-black text-xl rounded-xl shadow-lg transform transition active:scale-95 flex justify-center items-center gap-2">
                        Next Note <i data-lucide="shuffle" class="w-6 h-6"></i>
                    </button>
                </div>
                
                <div class="flex-1 bg-white rounded-[2rem] shadow-xl border-[6px] border-slate-200 flex flex-col items-center justify-center p-8 relative overflow-hidden">
                    <div class="text-5xl md:text-6xl font-black text-slate-800 mb-16 text-center">What is this note?</div>
                    
                    <div class="flex flex-col xl:flex-row items-center justify-center gap-16 xl:gap-32 w-full">
                        <!-- Giant Staff -->
                        <div class="relative w-[300px] h-[160px] transform scale-[1.5]">
                            <div class="absolute inset-x-0 top-[32px] border-t-[2px] border-slate-700/50 pointer-events-none"></div>
                            <div class="absolute inset-x-0 top-[44px] border-t-[2px] border-slate-700/50 pointer-events-none"></div>
                            <div class="absolute inset-x-0 top-[56px] border-t-[2px] border-slate-700/50 pointer-events-none"></div>
                            <div class="absolute inset-x-0 top-[68px] border-t-[2px] border-slate-700/50 pointer-events-none"></div>
                            <div class="absolute inset-x-0 top-[80px] border-t-[2px] border-slate-700/50 pointer-events-none"></div>
                            <span class="absolute -top-[16px] left-2 text-[70px] leading-none text-slate-800 pointer-events-none">&#119070;</span>
                            
                            <div class="absolute left-1/2">
                                ${state.gameTargetPitch ? getNoteSVGHTML({pitch: state.gameTargetPitch, type: 'w'}, false, false) : ''}
                            </div>
                        </div>

                        <!-- Answer Reveal Area -->
                        <div class="w-[300px] flex flex-col items-center justify-center min-h-[400px]">
                            ${state.gameShowAnswer ? `
                                <div class="text-7xl font-black text-emerald-600 mb-6 drop-shadow-sm">${state.gameTargetPitch.replace('4','').replace('5','')}</div>
                                <div class="transform scale-[1.2]">
                                    ${getFingeringHTML(state.gameTargetPitch, true)}
                                </div>
                            ` : `
                                <button onclick="app.toggleGameAnswer()" class="px-8 py-6 bg-amber-400 hover:bg-amber-300 text-amber-900 font-black text-3xl rounded-2xl shadow-xl border-b-8 border-amber-500 transform transition active:translate-y-2 active:border-b-0 w-full text-center">
                                    Reveal Answer 👀
                                </button>
                            `}
                        </div>
                    </div>
                </div>
            `;
        }

        function render() {
            const root = document.getElementById('root');
            
            let content = '';
            if (state.appMode === 'song') content = renderSongMode();
            else if (state.appMode === 'training') content = renderTrainingMode();
            else if (state.appMode === 'game') content = renderGameMode();

            root.innerHTML = renderNav() + `<div class="h-full w-full p-4 flex flex-col xl:flex-row gap-4 overflow-hidden min-h-0">${content}</div>`;
            
            if(window.lucide) {
                window.lucide.createIcons();
            }
        }

        window.onload = () => {
            appAPI.loadSong(5);
        };
    </script>
</body>
</html>
